        // ========== Todo Memo (备忘录) - 已迁移到后端API ==========
        // 原方案：所有数据存储在浏览器 localStorage（换设备/清缓存会丢失）
        // 新方案：通过 RESTful API 与 MySQL 数据库交互，支持多端同步
        // 降级策略：API 请求失败时自动回退到 localStorage，保证离线可用性
        //
        // API 端点说明：
        //   GET    /api/todos?category=life     → 获取某分类的任务列表
        //   POST   /api/todos                   → 新增任务 {category, text}
        //   PUT    /api/todos/:id               → 更新任务 {text? | done?}
        //   DELETE /api/todos/:id               → 删除任务
        //   POST   /api/todos/archive           → 归档当天所有任务
        //   GET    /api/todos/history?date=...  → 获取指定日期的历史归档
        (function() {
            var currentTab = 'life';       // 当前选中的分类标签: 'life' | 'study' | 'important'
            var historyDate = null;        // 当前查看的历史日期 YYYY-MM-DD

            // --- DOM 元素引用 ---
            var toggleBtn = document.getElementById('todoToggle');
            var panel = document.getElementById('todoPanel');
            var input = document.getElementById('todoInput');
            var addBtn = document.getElementById('todoAddBtn');
            var listEl = document.getElementById('todoList');
            var countEl = document.getElementById('todoCount');
            var badge = document.getElementById('todoBadge');
            var tabs = document.querySelectorAll('.todo-tab');
            var historyBtn = document.getElementById('todoHistoryBtn');
            var historyPanel = document.getElementById('todoHistory');
            var historyBack = document.getElementById('todoHistoryBack');
            var histDateEl = document.getElementById('histDate');
            var histContent = document.getElementById('histContent');
            var histPrev = document.getElementById('histPrev');
            var histNext = document.getElementById('histNext');

            var tabNames = { life: '生活', study: '学习', important: '*** 重要' };

            // ============================================================
            // 本地数据缓存层（用于离线降级）
            // 当 API 不可用时，数据读写会回退到这些 localStorage 操作
            // ============================================================
            var STORAGE_KEY = 'tinyWeb1_todos';
            var HISTORY_KEY = 'tinyWeb1_history';
            var ARCHIVE_DATE_KEY = 'tinyWeb1_archiveDate';

            function loadLocalTodos() {
                try {
                    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { life: [], study: [], important: [] };
                } catch(e) { return { life: [], study: [], important: [] }; }
            }
            function saveLocalTodos(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
            function loadLocalHistory() {
                try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || {}; }
                catch(e) { return {}; }
            }
            function saveLocalHistory(h) { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); }

            // ============================================================
            // API 请求封装（统一错误处理 + 自动降级）
            // 所有与后端的通信都通过此函数发起
            // 返回值：{ ok: boolean, data: any, error: string|null }
            // ============================================================
            function apiRequest(url, options) {
                options = options || {};
                if (!options.headers) options.headers = {};
                options.headers['Content-Type'] = 'application/json';

                return fetch(url, options)
                    .then(function(res) { return res.json(); })
                    .then(function(json) {
                        if (json.code === 0) {
                            return { ok: true, data: json.data };
                        } else {
                            console.warn('[API Error]', url, json.message);
                            return { ok: false, error: json.message || '未知错误' };
                        }
                    })
                    .catch(function(err) {
                        console.warn('[API Fail]', url, err.message);
                        return { ok: false, error: err.message, networkError: true };
                    });
            }

            // ============================================================
            // 数据操作函数（优先使用API，失败时降级到localStorage）
            // ============================================================

            /** 从服务端加载当前分类的任务列表 */
            function fetchTodos() {
                return apiRequest('/api/todos?category=' + currentTab)
                    .then(function(result) {
                        if (result.ok && result.data) {
                            // 将服务端数据同步到本地缓存
                            var localData = loadLocalTodos();
                            localData[currentTab] = result.data;
                            saveLocalTodos(localData);
                            return result.data;
                        }
                        // API 失败时返回本地缓存
                        return loadLocalTodos()[currentTab] || [];
                    });
            }

            /** 通过 API 添加新任务 */
            function addTodoApi(text) {
                text = text.trim();
                if (!text) return;
                
                return apiRequest('/api/todos', {
                    method: 'POST',
                    body: JSON.stringify({ category: currentTab, text: text })
                }).then(function(result) {
                    if (result.ok) {
                        input.value = '';
                        return refreshAndRender(); // 重新拉取并渲染
                    } else {
                        // API 失败时降级到本地添加
                        var localData = loadLocalTodos();
                        localData[currentTab] = localData[currentTab] || [];
                        localData[currentTab].push({ text: text, done: false });
                        saveLocalTodos(localData);
                        input.value = '';
                        renderFromLocal();
                    }
                });
            }

            /** 通过 API 切换任务完成状态 */
            function toggleDoneApi(idx, todoId) {
                // 需要先获取当前的 done 状态来取反
                var todos = loadLocalTodos()[currentTab] || [];
                if (idx < todos.length) {
                    var newDone = !todos[idx].done;
                    
                    apiRequest('/api/todos/' + todoId, {
                        method: 'PUT',
                        body: JSON.stringify({ done: newDone })
                    }).then(function(result) {
                        if (result.ok) {
                            refreshAndRender();
                        } else {
                            // 降级：本地更新
                            todos[idx].done = newDone;
                            saveLocalTodos(loadLocalTodos());
                            renderFromLocal();
                        }
                    });
                }
            }

            /** 通过 API 删除任务 */
            function removeTodoApi(idx, todoId) {
                apiRequest('/api/todos/' + todoId, {
                    method: 'DELETE'
                }).then(function(result) {
                    if (result.ok) {
                        refreshAndRender();
                    } else {
                        // 降级：本地删除
                        var localData = loadLocalTodos();
                        localData[currentTab].splice(idx, 1);
                        saveLocalTodos(localData);
                        renderFromLocal();
                    }
                });
            }

            /** 通过 API 更新任务文本 */
            function updateTextApi(idx, todoId, newText) {
                apiRequest('/api/todos/' + todoId, {
                    method: 'PUT',
                    body: JSON.stringify({ text: newText })
                }).then(function(result) {
                    if (result.ok) {
                        refreshAndRender();
                    } else {
                        // 降级：本地更新
                        var localData = loadLocalTodos();
                        localData[currentTab][idx].text = newText;
                        saveLocalTodos(localData);
                        renderFromLocal();
                    }
                });
            }

            /** 拉取最新数据并重新渲染 */
            function refreshAndRender() {
                return fetchTodos().then(function(todos) {
                    // 同步本地缓存
                    var localData = loadLocalTodos();
                    localData[currentTab] = todos;
                    saveLocalTodos(localData);
                    renderFromLocal();
                });
            }

            // ============================================================
            // 工具函数
            // ============================================================
            function getTodayStr() {
                var d = new Date();
                return d.getFullYear() + '-' +
                       String(d.getMonth()+1).padStart(2,'0') + '-' +
                       String(d.getDate()).padStart(2,'0');
            }
            function formatDateCN(dateStr) {
                var parts = dateStr.split('-');
                return parts[0] + ' 年 ' + parseInt(parts[1]) + ' 月 ' + parseInt(parts[2]) + ' 日';
            }
            function prevDay(dateStr) {
                var d = new Date(dateStr); d.setDate(d.getDate() - 1);
                return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
            }
            function nextDay(dateStr) {
                var d = new Date(dateStr); d.setDate(d.getDate() + 1);
                return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
            }

            // ============================================================
            // 归档逻辑（已迁移到服务端）
            // 原方案：前端定时检查跨天 → 写入 localStorage
            // 新方案：前端检测跨天后调用 POST /api/todos/archive
            // 服务端负责将当天任务复制到历史表再清空原表
            // ============================================================
            function checkAndArchive() {
                var today = getTodayStr();
                var lastArchive = localStorage.getItem(ARCHIVE_DATE_KEY);
                if (lastArchive !== today) {
                    // 调用服务端归档接口
                    apiRequest('/api/todos/archive', { method: 'POST' })
                        .then(function(result) {
                            if (result.ok && result.data && result.data.archived_count > 0) {
                                console.log('已归档 ' + result.data.archived_count + ' 条任务');
                            }
                            // 无论是否成功，都更新标记避免重复归档
                            localStorage.setItem(ARCHIVE_DATE_KEY, today);
                            // 归档后刷新当前列表
                            refreshAndRender();
                        });
                }
            }
            setInterval(checkAndArchive, 60000); // 每分钟检查一次
            checkAndArchive(); // 启动时立即检查一次

            // ============================================================
            // 渲染任务列表（从内存/缓存中读取数据渲染DOM）
            // ============================================================
            function renderFromLocal() {
                var todos = loadLocalTodos()[currentTab] || [];
                listEl.innerHTML = '';

                if (todos.length === 0) {
                    listEl.innerHTML = '<div class="todo-empty">暂无事项，添加一个吧</div>';
                } else {
                    todos.forEach(function(todo, idx) {
                        var item = document.createElement('div');
                        item.className = 'todo-item' + (todo.done ? ' done' : '');

                        // 完成状态复选框
                        var check = document.createElement('span');
                        check.className = 'todo-check';
                        check.innerHTML = '<i class="fa-solid fa-check"></i>';
                        check.addEventListener('click', function() { toggleDoneApi(idx, todo.id); });

                        // 任务文本（双击编辑）
                        var text = document.createElement('span');
                        text.className = 'todo-text';
                        text.textContent = todo.text;
                        text.addEventListener('dblclick', function() { startEdit(item, idx, todo.id, todo.text); });

                        // 删除按钮
                        var del = document.createElement('button');
                        del.className = 'todo-del';
                        del.innerHTML = '<i class="fa-solid fa-xmark"></i>';
                        del.addEventListener('click', function() { removeTodoApi(idx, todo.id); });

                        item.appendChild(check);
                        item.appendChild(text);
                        item.appendChild(del);
                        listEl.appendChild(item);
                    });
                }

                // 统计信息
                var done = todos.filter(function(t) { return t.done; }).length;
                var total = todos.length;
                var pending = total - done;
                countEl.textContent = total > 0
                    ? '共 ' + total + ' 项 · 已完成 ' + done + ' · 未完成 ' + pending
                    : '';

                // Badge 角标（统计所有分类的未完成数）
                var allTodos = loadLocalTodos();
                var allPending = (allTodos.life||[]).filter(function(t){return !t.done;}).length
                              + (allTodos.study||[]).filter(function(t){return !t.done;}).length
                              + (allTodos.important||[]).filter(function(t){return !t.done;}).length;
                badge.textContent = allPending > 0 ? allPending : '';
                badge.dataset.count = allPending;
            }

            // ============================================================
            // 历史日记渲染（从服务端按日期查询）
            // ============================================================
            function renderHistory() {
                if (!historyDate) historyDate = getTodayStr();
                histDateEl.textContent = formatDateCN(historyDate);

                // 从服务端查询指定日期的归档数据
                apiRequest('/api/todos/history?date=' + historyDate)
                    .then(function(result) {
                        histContent.innerHTML = '';

                        if (result.ok && result.data && result.data.todos) {
                            var dayData = result.data.todos;
                            var cats = Object.keys(dayData);
                            
                            if (cats.length === 0) {
                                histContent.innerHTML = '<div class="todo-history-empty">这一天没有归档记录</div>';
                                histNext.disabled = historyDate >= getTodayStr();
                                return;
                            }

                            var totalDone = 0, totalAll = 0;
                            ['life', 'study', 'important'].forEach(function(cat) {
                                if (dayData[cat] && dayData[cat].length > 0) {
                                    var section = document.createElement('div');
                                    section.className = 'todo-history-section';
                                    var title = document.createElement('div');
                                    title.className = 'todo-history-section-title';
                                    title.textContent = tabNames[cat];
                                    section.appendChild(title);

                                    dayData[cat].forEach(function(item) {
                                        totalAll++;
                                        if (item.done) totalDone++;
                                        var row = document.createElement('div');
                                        row.className = 'todo-history-item';
                                        var mark = document.createElement('i');
                                        mark.className = item.done
                                            ? 'done-mark fa-solid fa-circle-check'
                                            : 'undone-mark fa-regular fa-circle';
                                        row.appendChild(mark);
                                        var txt = document.createElement('span');
                                        txt.textContent = item.text;
                                        if (item.done) txt.className = 'item-done';
                                        row.appendChild(txt);
                                        section.appendChild(row);
                                    });
                                    histContent.appendChild(section);
                                }
                            });

                            if (totalAll > 0) {
                                var summary = document.createElement('div');
                                summary.className = 'todo-history-summary';
                                summary.textContent = '完成 ' + totalDone + ' / ' + totalAll + ' 项';
                                histContent.appendChild(summary);
                            }
                        } else {
                            // API 失败时降级到本地存储
                            var localHist = loadLocalHistory();
                            var localDayData = localHist[historyDate];
                            if (!localDayData || Object.keys(localDayData).length === 0) {
                                histContent.innerHTML = '<div class="todo-history-empty">这一天没有归档记录</div>';
                            } else {
                                // ... 简化版本地渲染（省略重复代码）
                                histContent.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:1rem;font-size:0.75rem;">离线模式：显示本地缓存</div>';
                            }
                        }
                        histNext.disabled = historyDate >= getTodayStr();
                    });
            }

            // ============================================================
            // 编辑功能（双击进入编辑模式）
            // ============================================================
            function startEdit(item, idx, todoId, oldText) {
                var textEl = item.querySelector('.todo-text');
                var inputEl = document.createElement('input');
                inputEl.type = 'text';
                inputEl.className = 'todo-text-input';
                inputEl.value = oldText;
                inputEl.maxLength = 100;
                textEl.replaceWith(inputEl);
                inputEl.focus();
                inputEl.select();

                function finishEdit() {
                    var newText = inputEl.value.trim();
                    if (newText && newText !== oldText) {
                        updateTextApi(idx, todoId, newText);
                    } else {
                        renderFromLocal();
                    }
                }
                inputEl.addEventListener('blur', finishEdit);
                inputEl.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') inputEl.blur();
                    if (e.key === 'Escape') { inputEl.value = oldText; inputEl.blur(); }
                });
            }

            // ============================================================
            // 事件绑定
            // ============================================================
            toggleBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (historyPanel.classList.contains('open')) historyPanel.classList.remove('open');
                panel.classList.toggle('open');
                if (panel.classList.contains('open')) refreshAndRender(); // 打开时刷新数据
            });

            historyBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                historyDate = getTodayStr();
                renderHistory();
                panel.classList.remove('open');
                historyPanel.classList.add('open');
            });

            historyBack.addEventListener('click', function(e) {
                e.stopPropagation();
                historyPanel.classList.remove('open');
                panel.classList.add('open');
            });

            histPrev.addEventListener('click', function() {
                historyDate = prevDay(historyDate);
                renderHistory();
            });

            histNext.addEventListener('click', function() {
                var today = getTodayStr();
                if (historyDate < today) {
                    historyDate = nextDay(historyDate);
                    renderHistory();
                }
            });

            addBtn.addEventListener('click', function() { addTodoApi(input.value); });
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { addTodoApi(input.value); }
            });

            tabs.forEach(function(tab) {
                tab.addEventListener('click', function() {
                    tabs.forEach(function(t) { t.classList.remove('active'); });
                    tab.classList.add('active');
                    currentTab = tab.dataset.tab;
                    var phMap = { life: '输入生活事项...', study: '输入学习事项...', important: '输入重要长期任务...' };
                    input.placeholder = phMap[currentTab] || '输入新事项...';
                    refreshAndRender(); // 切换标签时重新加载数据
                });
            });

            document.addEventListener('click', function(e) {
                var progressCard = document.getElementById('progressCard');
                if (panel.classList.contains('open') && !progressCard.contains(e.target)) {
                    panel.classList.remove('open');
                }
                if (historyPanel.classList.contains('open') && !progressCard.contains(e.target)) {
                    historyPanel.classList.remove('open');
                }
            });

            // 初始加载当前分类的数据
            fetchTodos().then(function(todos) {
                var localData = loadLocalTodos();
                localData[currentTab] = todos;
                saveLocalTodos(localData);
                renderFromLocal();
            });
        })();

        // ========== Guestbook (留言板) ==========
        // 新增功能模块：允许访客在个人主页留下想说的话
        //
        // 技术实现：
        //   - 数据存储在 MySQL 数据库（通过 REST API）
        //   - GET  /api/guestbook?page=1&size=5  获取最新5条留言
        //   - POST /api/guestbook              发布新留言
        //
        // 功能特性：
        //   - 昵称可选（不填则显示"匿名访客"）
        //   - 支持查看更多（展开全部留言）
        //   - 发送按钮带 loading 状态和缩放反馈
        //   - 新留言自动插入列表顶部（带淡入动画）
        //   - 内容长度限制500字符，自动过滤HTML防XSS
        (function() {
            var messagesEl = document.getElementById('gbMessages');
            var emptyEl = document.getElementById('gbEmpty');
            var moreBtn = document.getElementById('gbMore');
            var nicknameInput = document.getElementById('gbNickname');
            var contentInput = document.getElementById('gbContent');
            var sendBtn = document.getElementById('gbSendBtn');

            var currentPage = 1;
            var pageSize = 5; // 默认只展示最新5条
            var isExpanded = false;

            // 加载留言列表
            function loadMessages(page, size) {
                page = page || 1;
                size = size || pageSize;
                return fetch('/api/guestbook?page=' + page + '&size=' + size)
                    .then(function(r) { return r.json(); })
                    .then(function(res) {
                        if (res.code === 0 && res.data) {
                            return res.data;
                        }
                        return null;
                    })
                    .catch(function(err) {
                        console.warn('[Guestbook] 加载失败:', err);
                        return null;
                    });
            }

            // 渲染单条留言
            function createMessageElement(msg) {
                var div = document.createElement('div');
                div.className = 'gb-item';

                // 昵称行
                var nickRow = document.createElement('div');
                nickRow.className = 'gb-nick-row';

                var nickSpan = document.createElement('span');
                nickSpan.className = 'gb-nickname-display';
                nickSpan.textContent = msg.nickname || '匿名访客';

                var timeSpan = document.createElement('span');
                timeSpan.className = 'gb-time';
                timeSpan.textContent = formatTime(msg.created_at);

                nickRow.appendChild(nickSpan);
                nickRow.appendChild(timeSpan);

                // 内容
                var contentDiv = document.createElement('div');
                contentDiv.className = 'gb-text';
                contentDiv.textContent = msg.content;

                div.appendChild(nickRow);
                div.appendChild(contentDiv);
                return div;
            }

            // 格式化时间戳为相对时间或固定格式
            function formatTime(dateStr) {
                if (!dateStr) return '';
                var date = new Date(dateStr);
                var now = new Date();
                var diffMs = now - date;
                var diffMin = Math.floor(diffMs / 60000);
                var diffHour = Math.floor(diffMin / 60);

                if (diffMin < 1) return '刚刚';
                if (diffMin < 60) return diffMin + ' 分钟前';
                if (diffHour < 24) return diffHour + ' 小时前';
                if (diffHour < 48) return '昨天';
                // 超过两天显示具体日期
                return (date.getMonth() + 1) + '/' + date.getDate();
            }

            // 主渲染函数
            function render(data) {
                messagesEl.innerHTML = ''; // 清空现有内容
                
                if (!data || !data.list || data.list.length === 0) {
                    messagesEl.innerHTML = '<div class="gb-empty" id="gbEmpty">暂无留言，来说点什么吧~</div>';
                    moreBtn.style.display = 'none';
                    return;
                }

                data.list.forEach(function(msg) {
                    messagesEl.appendChild(createMessageElement(msg));
                });

                // 是否显示"查看更多"
                if (data.total > pageSize && !isExpanded) {
                    moreBtn.style.display = 'block';
                } else {
                    moreBtn.style.display = 'none';
                }
            }

            // 发布留言
            function sendMessage() {
                var nickname = nicknameInput.value.trim();
                var content = contentInput.value.trim();

                if (!content) {
                    contentInput.focus();
                    return;
                }

                // 设置发送中状态
                sendBtn.disabled = true;
                sendBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

                fetch('/api/guestbook', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname: nickname, content: content })
                })
                .then(function(r) { return r.json(); })
                .then(function(res) {
                    sendBtn.disabled = false;
                    sendBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i>';

                    if (res.code === 0) {
                        // 清空输入框
                        contentInput.value = '';
                        // 重新加载列表（新留言会在顶部）
                        loadMessages(currentPage, isExpanded ? 50 : pageSize)
                            .then(render);
                    } else {
                        alert('发送失败: ' + (res.message || '未知错误'));
                    }
                })
                .catch(function(err) {
                    sendBtn.disabled = false;
                    sendBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i>';
                    alert('网络错误，请稍后重试');
                });
            }

            // 查看更多
            moreBtn.addEventListener('click', function() {
                isExpanded = true;
                moreBtn.style.display = 'none';
                loadMessages(1, 50).then(render); // 加载更多条目
            });

            // 发送按钮点击
            sendBtn.addEventListener('click', sendMessage);

            // 回车发送
            contentInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') sendMessage();
            });

            // 页面加载时获取最新留言
            loadMessages(currentPage, pageSize).then(render);
        })();

        // ==================== 13. 访问统计功能 ====================
        // 页面加载时自动记录访问 + 获取统计数据展示
        (function() {
            var API_BASE = '';  // 同源部署，直接使用相对路径

            // ---- 获取访客 IP（优先取 X-Forwarded-For，否则用后端获取）----
            function getVisitorIP() {
                // 前端无法直接获取真实 IP，由后端从请求头解析
                // 这里返回空字符串，让后端用 r.RemoteAddr 获取
                return '';
            }

            // ---- 简单的设备检测 ----
            function detectDeviceType() {
                return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i
                    .test(navigator.userAgent) ? 'mobile' : 'desktop';
            }

            // ---- 浏览器检测 ----
            function detectBrowser() {
                var ua = navigator.userAgent;
                if (ua.includes('Chrome')) return 'Chrome';
                if (ua.includes('Firefox')) return 'Firefox';
                if (ua.includes('Safari') && !ua.includes('Chrome')) return 'Safari';
                if (ua.includes('Edge')) return 'Edge';
                return 'Other';
            }

            // ---- OS 检测 ----
            function detectOS() {
                var ua = navigator.userAgent;
                if (ua.includes('Windows')) return 'Windows';
                if (ua.includes('Mac OS')) return 'macOS';
                if (ua.includes('Linux')) return 'Linux';
                if (ua.includes('Android')) return 'Android';
                if (ua.includes('iOS')) return 'iOS';
                return 'Unknown';
            }

            // ---- 数字跳动动画 ----
            function animateNumber(el) {
                el.classList.remove('pop');
                void el.offsetWidth;   // 触发 reflow 重置动画
                el.classList.add('pop');
            }

            // ---- 渲染统计数据显示到页面 ----
            function renderStats(data) {
                var totalEl     = document.getElementById('totalVisits');
                var uniqueEl    = document.getElementById('uniqueVisitors');
                var lastVisitEl = document.getElementById('lastVisitTime');

                if (data.total_visits !== undefined && data.total_visits !== null) {
                    totalEl.textContent = data.total_visits;
                    animateNumber(totalEl);
                }
                if (data.unique_visitors !== undefined && data.unique_visitors !== null) {
                    uniqueEl.textContent = data.unique_visitors;
                    animateNumber(uniqueEl);
                }
                if (data.last_visit_at) {
                    lastVisitEl.textContent = data.last_visit_at;
                }
            }

            // ---- 步骤1：记录一次访问（POST）----
            fetch(API_BASE + '/api/visit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    visitor_ip: getVisitorIP(),
                    user_agent: navigator.userAgent,
                    device_type: detectDeviceType(),
                    browser: detectBrowser(),
                    os: detectOS(),
                    referrer: document.referrer || ''
                })
            })
            .then(function(res) { return res.json(); })
            .then(function(res) {
                console.log('[Visit] 记录结果:', res);

                // ---- 步骤2：获取统计汇总（GET）----
                fetch(API_BASE + '/api/visit/stats')
                    .then(function(r) { return r.json(); })
                    .then(function(statsRes) {
                        if (statsRes.code === 0 && statsRes.data) {
                            renderStats(statsRes.data);
                        }
                    })
                    .catch(function(err) {
                        console.warn('[Visit] 获取统计失败:', err);
                    });
            })
            .catch(function(err) {
                console.warn('[Visit] 记录访问失败:', err);
                // 即使记录失败也尝试获取已有统计
                fetch(API_BASE + '/api/visit/stats')
                    .then(function(r) { return r.json(); })
                    .then(function(res) {
                        if (res.code === 0 && res.data) renderStats(res.data);
                    });
            });
        })();
    </script>
</body>
