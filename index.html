<!DOCTYPE html>
<!-- 
  =====================================================
  个人主页 - 任涵
  最后更新: 2026-04-01
  功能说明：
    - 响应式个人主页（适配手机/电脑）
    - 暗色/亮色主题切换（根据时间自动判断）
    - 实时时钟 + 时间进度条（日/周/月/年）
    - 一言（随机名言）展示，点击可刷新
    - 社交链接图标
    - 备忘录功能（支持分类、历史归档）
    - 小电视动画角色
    - 鼠标视差效果背景
    - 3D 卡片倾斜效果
  =====================================================
-->
<html lang="zh-CN">
<head>
    <!-- ==================== 元信息配置 ==================== -->
    
    <!-- 字符编码：UTF-8 支持中文和所有语言字符 -->
    <meta charset="UTF-8">
    
    <!-- 视口设置：让页面在手机上正确显示，禁止用户缩放 -->
    <!-- width=device-width: 页面宽度等于设备宽度 -->
    <!-- initial-scale=1.0: 初始缩放比例为100% -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 浏览器标签页显示的标题 -->
    <title>任涵 - 个人主页</title>
    
    <!-- ==================== 外部资源引入 ==================== -->
    
    <!-- Google Fonts 预连接：加速字体加载 -->
    <!-- preconnect 提前建立连接，减少DNS查询时间 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- 引入 Google Fonts 字体 -->
    <!-- Ma Shan Zheng: 中文书法字体（用于名字显示） -->
    <!-- Noto Sans SC: 思源黑体（用于正文，支持多种字重） -->
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 图标库 -->
    <!-- 用于显示 GitHub、微信、QQ 等社交图标，以及各种 UI 图标 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ==================== CSS 样式表开始 ==================== -->
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }





        /* ==================== 小电视 ==================== */
        .doggo {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
        }

        .doggo svg {
            width: 100%;
            height: 100%;
        }

        .doggo-body {
            transform-origin: bottom center;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }                                                           

        /* 小跳 */
        @keyframes dogBounce {
            0%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
            60% { transform: translateY(-4px); }
        }








        /* ==================== CSS 自定义属性（主题变量）====================
         * 使用 CSS 变量实现主题切换的核心机制
         * :root 选择器定义全局默认变量（暗色模式）
         * html.light 覆盖这些变量实现亮色模式
         * 
         * 变量命名规则：
         *   --xxx-bg    背景颜色
         *   --xxx-text  文字颜色
         *   --accent    强调色（按钮、链接等）
         */
        
        /* ====== 默认主题：夜间模式（Dark Theme）====== 
         * 这是基础主题，模仿小说阅读APP的夜间模式风格
         * 颜色特点：深色背景 + 暖色调文字（护眼）
         */
        :root {
            /* Night Mode — 深色底 + 柔和暖字（小说夜间风格） */
            
            /* --- 背景色系 --- */
            --bg-cover: rgba(0, 0, 0, 0.4);           /* 背景遮罩：半透明黑色，让图片变暗 */
            --card-bg: rgb(20 20 30 / 60%);             /* 卡片背景：深蓝黑色半透明 */
            --card-hover-bg: rgb(30 30 45 / 65%);       /* 卡片悬停时稍亮一点 */
            
            /* --- 文字色系 --- */
            --text-main: #c8c0b0;                       /* 主文字：暖米色 */
            --text-sub: rgba(200, 192, 176, 0.55);     /* 副文字：更淡的暖色 */
            --text-dim: rgba(200, 192, 176, 0.35);     /* 弱化文字：最淡，用于提示信息 */
            
            /* --- 强调色系 --- */
            --accent: #e8a86d;                          /* 主强调色：琥珀橙金色 */
            --accent-glow: rgba(232, 168, 109, 0.25);  /* 强调色的发光效果（用于阴影） */
            
            /* --- 其他UI元素 --- */
            --radius: 6px;                              /* 统一圆角大小 */
            --social-bg: rgb(255 255 255 / 8%);        /* 社交图标按钮背景：微白 */
            --divider-bg: rgba(255,255,255,0.06);      /* 分隔线颜色 */
            --progress-track-bg: rgb(255 255 255 / 6%);/* 进度条轨道背景 */
            --avatar-border: rgba(255, 200, 120, 0.2); /* 头像边框颜色 */
        }

        /* ====== 亮色模式覆盖（Light Theme Override）======
         * 当 html 元素拥有 .light 类时生效
         * 只需覆盖需要改变的变量，其他保持 :root 的值
         */
        html.light {
            /* Day Mode — 暖白底 + 深棕字（小说白天风格） */
            
            /* 背景色改为温暖的米白色调 */
            --bg-cover: rgba(225, 215, 195, 0.7);      /* 背景遮罩：暖色调 */
            --card-bg: rgb(240 232 218 / 60%);          /* 卡片背景：奶白色 */
            --card-hover-bg: rgb(240 232 218 / 72%);    /* 悬停时稍不透明 */
            
            /* 文字改为深棕色系（在浅色背景上可读性好） */
            --text-main: #3b3226;                       /* 主文字：深咖啡色 */
            --text-sub: rgba(59, 50, 38, 0.6);         /* 副文字：中等深度 */
            --text-dim: rgba(59, 50, 38, 0.38);         /* 弱化文字 */
            
            /* 强调色改为更深沉的棕色 */
            --accent: #b87333;                          /* 主强调色：土黄色 */
            --accent-glow: rgba(184, 115, 51, 0.18);   /* 发光效果 */
            
            /* UI元素适配亮色背景 */
            --social-bg: rgb(0 0 0 / 5%);              /* 图标背景：微黑 */
            --divider-bg: rgba(80, 60, 30, 0.1);       /* 分隔线 */
            --progress-track-bg: rgb(80 60 30 / 10%);  /* 进度条轨道 */
            --avatar-border: rgba(100, 70, 30, 0.2);   /* 头像边框 */
        }

        /* ==================== 主体与过渡效果 ====================
         * body 元素的样式和主题切换时的平滑过渡
         */
        body {
            transition: background-color 0.6s ease;  /* 背景色变化时0.6秒渐变，ease是缓动函数 */
        }

        /* 卡片组件的统一过渡效果
         * 包含背景、变换、阴影的过渡动画
         * 当鼠标悬停或主题切换时会触发这些属性的变化
         */
        .cards {
            transition: background 0.6s ease, transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* ==================== 背景图片样式（夜间模式）====================
         * .bg-all 是固定在页面背后的全屏背景容器
         * 使用 object-fit: cover 确保图片铺满不变形
         */
        
        /* 夜间模式下的背景图片滤镜处理 */
        .bg-all img {
            width: 100%;              /* 宽度撑满容器 */
            height: 100%;             /* 高度撑满容器 */
            object-fit: cover;        /* 保持比例填满容器（可能裁剪边缘） */
            
            /* 滤镜组合：让图片变暗变柔和不抢眼
             * blur(0px)     - 模糊0像素（无模糊）
             * brightness()  - 亮度降低到55%
             * saturate()    - 饱和度降到80%
             * sepia()       - 添加20%棕褐色调（复古感）
             */
            filter: blur(0px) brightness(0.55) saturate(0.8) sepia(0.2);
            
            transform: scale(1.05);   /* 放大5%，为缩放动画留空间 */
            
            /* 背景缓慢放大缩小动画，营造呼吸感 */
            animation: bgZoom 20s ease-in-out infinite alternate;
            
            transition: filter 1s ease;  /* 滤镜变化时的过渡（用于主题切换） */
        }

        /* ====== 白天模式覆盖样式 ======
         * html.light 下生效的背景相关样式
         */
        
        /* 白天模式：纯色暖白背景 */
        html.light body {
            background: #f5eee3;      /* 米白色：类似纸张的颜色 */
        }

        /* 白天模式的图片滤镜：更亮、更柔和 */
        html.light .bg-all img {
            filter: blur(1px) brightness(1.15) saturate(0.6) sepia(0.15);
            /* blur增加柔和感，brightness提高亮度，降低饱和度更素雅 */
        }

        /* 无图片时的备用渐变背景（白天模式）
         * linear-gradient 线性渐变，从左上到右下
         * 多个颜色停靠点创造丰富的层次感
         */
        html.light .bg-fallback {
            background: linear-gradient(135deg, #f5eee3 0%, #ede4d3 30%, #f7f0e6 60%, #ebe0ce 100%);
        }

        /* 白天模式下名字的渐变色改为深棕色调 */
        html.light .avatar-name {
            background: linear-gradient(135deg, #8b5e3c 0%, #b87333 45%, #a0522d 100%);
            -webkit-background-clip: text;    /* Safari兼容：将背景裁剪到文字区域 */
            background-clip: text;             /* 标准写法 */
        }

        /* 加载动画的颜色适配白天模式 */
        html.light .loader-inner:nth-child(1) { border-bottom-color: #8b7355; }
        html.light .loader-inner:nth-child(2) { border-right-color: #8b7355; }
        html.light .loader-inner:nth-child(3) { border-top-color: #8b7355; }
        html.light .loader-text { color: #8b7355; }
        html.light #loading { background: #f5eee3; }

        html.light .social-card a {
            background: var(--social-bg);
            color: var(--text-sub);
        }

        html.light .social-card a:hover {
            background: var(--accent);
            color: #fff;
        }

        html.light .section-divider::before,
        html.light .section-divider::after {
            background: linear-gradient(90deg, transparent, var(--divider-bg), transparent);
        }

        html.light .progress-track {
            background: var(--progress-track-bg);
        }

        html.light .name-deco i {
            background: var(--accent);
        }

        html.light .footer {
            color: var(--text-dim);
        }

        html.light .footer a {
            color: var(--text-sub);
        }

        html.light .footer a:hover {
            color: var(--accent);
        }

        html.light .link-card:hover {
            box-shadow: 0 6px 20px rgba(100, 70, 30, 0.12);
        }

        html.light .message-card .fa-quote-left,
        html.light .message-card .fa-quote-right {
            color: var(--accent);
        }

        /* ==================== 一言卡片点击刷新效果 ====================
         * 一言（Hitokoto）是来自 hitokoto.cn 的随机名言服务
         * 这部分定义点击卡片时的刷新动画
         */
        .hitokoto-card {
            cursor: pointer;          /* 鼠标指针变成手型，提示可点击 */
            user-select: none;        /* 禁止选中文字，防止快速点击时选中文字 */
        }

        /* 提示文字：默认隐藏，悬停时显示 */
        .hitokoto-card .hitokoto-hint {
            display: none;            /* 默认不显示 */
            font-size: 0.65rem;       /* 很小的字体 */
            color: var(--text-dim);   /* 使用弱化文字颜色变量 */
            text-align: right;        /* 右对齐 */
            margin-top: 0.4rem;
            opacity: 0.7;             /* 半透明 */
        }

        /* 鼠标悬停时显示提示文字 */
        .hitokoto-card:hover .hitokoto-hint {
            display: block;           /* 显示为块级元素 */
        }

        /* 刷新动画关键帧：文字上移淡出 → 下移淡入
         * 用于点击刷新一言时的过渡动画
         */
        @keyframes hitokotoRefresh {
            0% { opacity: 1; transform: translateY(0); }       /* 开始：完全可见，原位 */
            40% { opacity: 0; transform: translateY(-8px); }  /* 上移并淡出 */
            60% { opacity: 0; transform: translateY(8px); }   /* 在下方等待（不可见） */
            100% { opacity: 1; transform: translateY(0); }    /* 从下方滑入并显示 */
        }

        /* 正在刷新时应用的动画类 */
        .hitokoto-card.refreshing #hitokoto_text,
        .hitokoto-card.refreshing #hitokoto_from {
            display: inline;
            animation: hitokotoRefresh 0.6s ease forwards;
            /* forwards 表示动画结束后保持最后一帧的状态 */
        }

        /* 刷新时隐藏提示文字 */
        .hitokoto-card.refreshing .hitokoto-hint {
            display: none;
        }

        /* ==================== 滚动条隐藏 ====================
         * 隐藏浏览器默认滚动条，让页面更美观
         * 但保留滚动功能（用户仍可滚动）
         */

        /* ==================== 页面主体样式 ==================== 
         * body 是页面的根容器，设置全局字体和基础布局
         */
        body {
            width: 100%;              /* 宽度100%，撑满视口 */
            min-height: 100vh;        /* 最小高度为视口高度的100%（确保至少满屏） */
            font-family: 'Noto Sans SC', sans-serif;  /* 使用思源黑体字体（Google Fonts引入） */
            color: var(--text-main);  /* 文字颜色使用CSS变量（会根据主题自动切换） */
            overflow-x: hidden;       /* 水平方向隐藏溢出内容（防止横向滚动条出现） */
            cursor: default;          /* 默认鼠标指针样式（箭头） */
        }

        /* ==================== 加载动画（Loading Screen）====================
         * 页面加载时显示的全屏遮罩层
         * 使用三个旋转的圆环组成3D加载效果
         * 页面资源加载完成后淡出隐藏
         * 
         * 设计思路：
         *   - 固定定位覆盖整个屏幕
         *   - Flex布局使内容居中
         *   - 通过添加 .hide 类触发淡出动画
         */
        
        /* 加载遮罩层容器：固定定位覆盖整个屏幕 */
        #loading {
            position: fixed;          /* 固定定位：不随页面滚动移动 */
            inset: 0;                 /* 快捷写法：等于 top:0; right:0; bottom:0; left:0; */
            z-index: 99999;           /* 层级最高，确保在所有内容之上 */
            display: flex;            /* Flex弹性盒子布局 */
            align-items: center;      /* 子元素垂直居中 */
            justify-content: center;  /* 子元素水平居中 */
            background: #333;         /* 深灰色背景色 */
            transition: opacity 0.6s ease, visibility 0.6s ease;
            /* 过渡效果：透明度和可见性变化时用0.6秒平滑过渡 */
        }

        #loading.hide {
            opacity: 0;
            visibility: hidden;
        }

        /* 加载动画外层容器：提供3D透视效果 */
        .loader {
            width: 50px;
            height: 50px;
            border-radius: 50%;        /* 圆形容器 */
            perspective: 800px;        /* 3D透视距离：让子元素的3D旋转效果更明显 */
        }

        /* 三个加载圆环：绝对定位重叠在一起，每个只显示一条边框 */
        .loader-inner {
            position: absolute;        /* 绝对定位，使三个圆环完全叠在一起 */
            box-sizing: border-box;    /* 边框包含在尺寸内 */
            width: 100%;
            height: 100%;
            border-radius: 50%;         /* 圆形 */
        }

        /* 第一个圆环（左上角定位）：底部边框可见，绕特定3D轴旋转
         * nth-child(1) 选择第一个子元素
         */
        .loader-inner:nth-child(1) {
            left: 0; top: 0;
            border-bottom: 2.5px solid #efefef;   /* 只显示底边（白色） */
            animation: spin1 1s linear infinite;    /* 应用spin1动画：无限循环，匀速 */
        }

        /* 第二个圆环（右上角定位）：右边框可见，不同的3D旋转轴 */
        .loader-inner:nth-child(2) {
            right: 0; top: 0;
            border-right: 2.5px solid #efefef;     /* 只显示右边 */
            animation: spin2 1s linear infinite;     /* spin2动画：不同角度的旋转 */
        }

        /* 第三个圆环（右下角定位）：顶部边框可见 */
        .loader-inner:nth-child(3) {
            right: 0; bottom: 0;
            border-top: 2.5px solid #efefef;        /* 只显示顶边 */
            animation: spin3 1s linear infinite;     /* spin3动画：第三个角度 */
        }

        /* "LOADING" 文字标签：显示在圆环下方 */
        .loader-text {
            position: absolute;        /* 相对于父容器 .loader 定位 */
            color: #fff;               /* 白色文字 */
            font-size: 0.85rem;
            font-weight: 300;          /* 细体字重（300 = light） */
            letter-spacing: 3px;       /* 字母间距加宽，增加设计感 */
            margin-top: 48px;          /* 在圆环下方48像素处显示 */
        }

        /* ==================== 3D加载旋转动画关键帧 ====================
         * 每个圆环绕不同的3D轴组合旋转
         * rotateX(35deg) - 绕水平轴倾斜35度（上下翻转）
         * rotateY(-45deg) - 绕垂直轴倾斜-45度（左右翻转）
         * rotateZ(0→360) - 在这个倾斜的平面内旋转360度
         * 
         * 三个圆环的倾斜角度不同，形成立体交叉的轨道效果
         */
        
        /* 第一个圆环：向左后方倾斜，在斜面上旋转 */
        @keyframes spin1 {
            from { transform: rotateX(35deg) rotateY(-45deg) rotateZ(0); }
            to   { transform: rotateX(35deg) rotateY(-45deg) rotateZ(360deg); }
        }

        /* 第二个圆环：更陡峭的倾斜角度，不同的方向 */
        @keyframes spin2 {
            from { transform: rotateX(50deg) rotateY(10deg) rotateZ(0); }
            to   { transform: rotateX(50deg) rotateY(10deg) rotateZ(360deg); }
        }

        /* 第三个圆环：向右前方倾斜 */
        @keyframes spin3 {
            from { transform: rotateX(35deg) rotateY(55deg) rotateZ(0); }
            to   { transform: rotateX(35deg) rotateY(55deg) rotateZ(360deg); }
        }

        /* ==================== 背景层样式（Background）====================
         * 背景由多层组成：
         *   1. bg-fallback - 备用渐变背景（图片加载失败时显示）
         *   2. img - 实际背景图片
         *   3. bg-cover - 半透明遮罩层（调整亮度和色调）
         */

        /* 全屏背景容器：固定定位，不随页面滚动 */
        .bg-all {
            position: fixed;          /* 固定定位：始终覆盖整个视口 */
            inset: 0;                 /* 铺满全屏 */
            z-index: 0;               /* 层级最低，作为背景 */
        }

        /* 图片加载失败时隐藏（通过JS添加 .error 类触发） */
        .bg-all img.error {
            display: none;
        }

        /* ==================== 背景缓慢缩放动画 ====================
         * 让背景有轻微的"呼吸"效果
         * alternate 表示来回播放（放大→缩小→放大...）
         */
        @keyframes bgZoom {
            0% { transform: scale(1.05); }    /* 初始：放大5%（配合CSS中的scale(1.05)） */
            100% { transform: scale(1.15); }  /* 结束：放大15% */
        }

        /* 背景遮罩层：径向渐变，中心透明边缘深色
         * 用于压暗背景图片边缘，突出中心内容
         */
        .bg-cover {
            position: absolute;       /* 相对于父容器绝对定位 */
            inset: 0;                 /* 铺满父容器 */
            background: radial-gradient(
                ellipse at center,                        /* 椭圆形渐变，中心点开始 */
                rgba(0,0,0,0.2) 0%,                      /* 中心：20%透明度的黑色（几乎不暗） */
                var(--bg-cover) 100%                     /* 边缘：使用主题变量的颜色（较暗） */
            );
        }

        /* 备用背景：当图片加载失败时显示的纯CSS渐变
         * linear-gradient 线性渐变：从左上到右下（135度角）
         * 使用深蓝绿色调，营造科技感
         */
        .bg-fallback {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 30%, #2c5364 60%, #0f2027 100%);
            z-index: -1;              /* 在图片下方（如果图片正常显示） */
        }

        /* ==================== 主内容区域（Section）====================
         * 这是包裹所有卡片的容器，使用Flex布局实现垂直居中
         */
        .section {
            position: relative;       /* 相对定位：作为子元素的定位参考 */
            z-index: 1;               /* 层级高于背景层 */
            min-height: 100vh;        /* 最小高度 = 视口高度（确保内容可以垂直居中） */
            display: flex;            /* Flex弹性布局 */
            align-items: center;      /* 子元素垂直居中 */
            justify-content: center;  /* 子元素水平居中 */
            padding: 2rem;            /* 内边距：32像素 */
        }

        /* ==================== 主内容容器（Container）====================
         * 限制最大宽度并居中，是所有卡片的直接父元素
         * 页面加载时有淡入模糊的入场动画
         */
        .container {
            max-width: 980px;         /* 最大宽度980像素（三栏布局需要更宽） */
            width: 88vw;              /* 宽度为视口宽度的88%（响应式） */
            margin: 0 auto;           /* 水平居中（左右margin相等） */
            animation: fadeBlur 1.2s ease 0.3s both;
        }

        /* ==================== 容器入场动画 ====================
         * 页面加载时内容的淡入+模糊消除效果
         * 从模糊、透明、下移的状态过渡到清晰可见
         */
        @keyframes fadeBlur {
            0% { 
                opacity: 0;                    /* 完全透明 */  
                filter: blur(10px);            /* 高斯模糊10像素 */
                transform: translateY(20px);   /* 向下偏移20像素 */
            }
            100% { 
                opacity: 1;                    /* 完全不透明 */
                filter: blur(0);              /* 无模糊 */
                transform: translateY(0);     /* 回到原位 */
            }
        }

        /* ==================== 卡片交错上滑入场动画 ====================
         * slideUp 动画定义：从下方淡入
         * 通过给不同卡片设置不同的 animation-delay 实现交错效果
         * 让页面加载时卡片依次出现，更有层次感
         */
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px); }   /* 起始：透明且在下方30px */
            100% { opacity: 1; transform: translateY(0); }     /* 结束：完全不透明在原位 */
        }

        .col-left .cards:nth-child(1) { animation: slideUp 0.7s ease 0.4s both; }
        .col-left .cards:nth-child(2) { animation: slideUp 0.7s ease 0.55s both; }
        .col-left .cards:nth-child(3) { animation: slideUp 0.7s ease 0.7s both; }

        .col-right .top-row .cards:nth-child(1) { animation: slideUp 0.7s ease 0.45s both; }
        .col-right .top-row .cards:nth-child(2) { animation: slideUp 0.7s ease 0.55s both; }
        .col-right .section-divider:nth-child(2) { animation: slideUp 0.6s ease 0.6s both; }
        .col-right .links-grid { animation: slideUp 0.6s ease 0.65s both; }
        .col-right .section-divider:nth-child(4) { animation: slideUp 0.6s ease 0.95s both; }
        .col-right .progress-card { animation: slideUp 0.7s ease 1s both; }
.col-guestbook { animation: slideUp 0.7s ease 1.05s both; }

        /* ==================== 双列布局行容器 ====================
         * Flexbox实现左右两栏布局
         */
        .row {
            display: flex;            /* 弹性盒子：子元素水平排列 */
            gap: 2rem;                /* 子元素间距：32像素（rem是相对单位，基于根元素字体大小） */
            align-items: flex-start;  /* 顶部对齐（不拉伸高度） */
        }

        /* ==================== 卡片通用样式（Cards Base）====================
         * 所有卡片共享的基础样式 - 毛玻璃效果
         * backdrop-filter 是现代CSS特性，让背景透过卡片时产生模糊效果
         */
        .cards {
            background: var(--card-bg);              /* 背景色：使用CSS变量，会根据主题自动切换 */
            backdrop-filter: blur(10px);             /* 毛玻璃模糊效果：背景透过时模糊10像素 */
            -webkit-backdrop-filter: blur(10px);     /* Safari浏览器兼容前缀（旧版Safari需要） */
            border-radius: var(--radius);             /* 圆角：6px */
            transition: all 0.3s ease;                /* 所有属性变化都有0.3秒平滑过渡 */
        }

        /* 卡片鼠标悬停状态 */
        .cards:hover {
            background: var(--card-hover-bg);         /* 背景稍微变亮/不透明一点，提供视觉反馈 */
        }

        /* ====== 白天模式的卡片额外样式 ======
         * 在浅色背景上需要边框和阴影来区分卡片和背景
         */
        html.light .cards {
            border: 1px solid rgba(180, 160, 130, 0.25);    /* 浅棕色细边框 */
            box-shadow: 0 1px 4px rgba(80, 60, 30, 0.06);   /* 微弱阴影：轻微浮起感 */
        }

        html.light .cards:hover {
            box-shadow: 0 3px 10px rgba(80, 60, 30, 0.1);   /* 悬停时阴影加深 */
            border-color: rgba(180, 160, 130, 0.35);          /* 边框更明显 */
        }

        /* ==================== 左侧列（Left Column）====================
         * 包含三个卡片：
         *   1. 头像卡片（Avatar Card）
         *   2. 消息/简介卡片（Message Card）
         *   3. 社交链接卡片（Social Card）
         * 
         * 特点：固定宽度、垂直排列、滚动时粘性定位（sticky）
         */
        .col-left {
            flex: 0 0 240px;        /* flex: 0 0 240px 表示：不伸缩，基础宽度240px */
                                    /* flex-grow: 0 不放大, flex-shrink: 0 不缩小, flex-basis: 240px */
            display: flex;           /* 弹性布局 */
            flex-direction: column;  /* 子元素垂直排列（从上到下） */
            gap: 0.8rem;             /* 子元素间距：约13像素 */
            position: sticky;        /* 粘性定位！关键特性：滚动到一定位置后固定不动 */
            top: 2rem;               /* 距离顶部32px时开始粘住 */
            margin-top: 15vh;        /* 顶部外边距：视口高度的15%（让内容偏下一点） */
        }

        /* ==================== 头像卡片（Avatar Card）====================
         * 显示用户头像和名字的卡片
         * 布局：左侧小电视+头像图片 | 右侧名字+描述文字
         * 
         * 特殊处理：
         *   - 取消毛玻璃效果（背景设为none）
         *   - 头像悬停时有放大效果
         *   - 名字使用渐变色
         */
        
        /* 头像卡片容器：水平排列子元素 */
        .avatar-card {
            display: flex;           /* 弹性布局（水平方向默认） */
            align-items: center;     /* 垂直居中对齐 */
            gap: 1.2rem;             /* 子元素间距：约19像素 */
            padding: 1rem;           /* 内边距：16像素 */
            background: none;        /* 无背景色（透明） */
            backdrop-filter: none;   /* 无模糊效果 */
            -webkit-backdrop-filter: none;
        }

        /* 用户头像图片样式 */
        .avatar-img {
            width: 60px;             /* 宽度60像素 */
            height: 60px;            /* 高度60像素 */
            border-radius: 50%;      /* 圆形（正方形的50%圆角就是圆） */
            object-fit: cover;       /* 图片填充方式：裁剪以填满，保持比例 */
            border: 2px solid var(--avatar-border);  /* 边框：使用主题变量颜色 */
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.6s ease;
            /* 过渡效果：变换用弹性曲线，边框颜色平滑过渡 */
        }

        /* 鼠标悬停时头像放大1.2倍 */
        .avatar-card:hover .avatar-img {
            transform: scale(1.2);   /* 放大到120%大小 */
        }

        /* ==================== 用户名字样式 ====================
         * 使用中文书法字体 + 渐变色彩 + 发光阴影
         * 营造个性化的视觉效果
         */
        .avatar-name {
            font-family: 'Ma Shan Zheng', cursive;  /* 使用马善政书法字体 */
            font-size: 1.6rem;                     /* 字体大小：约25.6像素 */
            font-weight: 400;                       /* 正常字重 */
            letter-spacing: 3px;                    /* 字母/字符间距加宽 */
            margin-bottom: 0.2rem;                  /* 底部小间距 */
            
            /* 渐变背景色：用于给文字上色（配合 background-clip 使用） */
            background: linear-gradient(135deg, #f0945e 0%, #ffcc80 45%, #f8b195 100%);
            /* 135度角线性渐变：橙→金→粉橙色 */
            
            -webkit-background-clip: text;    /* Safari：将背景裁剪到文字形状 */
            -webkit-text-fill-color: transparent;  /* Safari：文字填充透明（显示背景渐变） */
            background-clip: text;             /* 标准：背景裁剪到文字 */
            
            filter: drop-shadow(0 0 6px rgba(240, 148, 94, 0.4));
            /* 发光投影：模拟霓虹灯/发光效果 */
            
            display: inline-flex;     /* 行内弹性盒子（让装饰元素同行显示） */
            align-items: center;      /* 垂直居中 */
            gap: 8px;                 /* 与右侧装饰的间距 */
        }

        /* ==================== 名字右侧装饰元素 ====================
         * 三个小圆点，由大到小排列
         * 模拟日式排版中的"花边"或装饰符号
         * 
         * HTML结构：<span class="name-deco"><i></i><i></i><i></i></span>
         */
        .name-deco {
            display: inline-flex;     /* 行内弹性盒子 */
            align-items: center;      /* 垂直居中对齐 */
            gap: 4px;                 /* 圆点之间间距 */
        }

        /* 每个装饰圆点的通用样式 */
        .name-deco i {                /* i 是伪元素占位符，不是斜体 */
            display: inline-block;
            background: var(--accent);  /* 使用主题强调色作为背景 */
            border-radius: 50%;          /* 圆形 */
            opacity: 0.6;                /* 半透明（60%不透明度） */
        }

        .name-deco i:nth-child(1) {
            width: 3px;
            height: 3px;
        }

        .name-deco i:nth-child(2) {
            width: 5px;
            height: 5px;
            opacity: 0.5;
        }

        .name-deco i:nth-child(3) {
            width: 4px;
            height: 4px;
            opacity: 0.4;
        }

        .avatar-desc {
            font-size: 0.75rem;
            color: var(--text-sub);
            letter-spacing: 0.5px;
        }

        /* Message Card */
        .message-card {
            padding: 1.2rem 1.4rem;
            position: relative;
        }

        .message-card .fa-quote-left,
        .message-card .fa-quote-right {
            color: var(--accent);
            font-size: 0.7rem;
            opacity: 0.6;
        }

        .message-card .fa-quote-left {
            position: absolute;
            top: 10px;
            left: 12px;
        }

        .message-card .fa-quote-right {
            position: absolute;
            bottom: 10px;
            right: 12px;
        }

        .message-text {
            font-size: 0.85rem;
            font-weight: 300;
            line-height: 1.8;
            color: var(--text-sub);
            padding: 0.3rem 0;
        }

        html.light .message-text {
            color: var(--text-main);
            opacity: 0.9;
        }

        .message-text strong {
            color: var(--text-main);
            font-weight: 500;
        }

        /* Social Card */
        .social-card {
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .social-card a {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            background: var(--social-bg);
            color: var(--text-sub);
            font-size: 1rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-card a:hover {
            background: var(--accent);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        /* ==================== RIGHT COLUMN ==================== */
        .col-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            min-width: 0;
            margin-top: 15vh;
        }

        /* ==================== 留言板侧边栏（Guestbook Sidebar）==================== */
        .col-guestbook {
            flex: 0 0 260px;           /* 固定宽度260px */
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            position: sticky;          /* 粘性定位：滚动时固定在右侧 */
            top: 2rem;
            height: fit-content;
            max-height: calc(100vh - 4rem);
            overflow-y: auto;
            margin-top: 15vh;
        }

        /* Top Row: Hitokoto + Time */
        .top-row {
            display: flex;
            gap: 0.8rem;
        }

        .top-row > * {
            flex: 1;
        }

        /* Hitokoto Card */
        .hitokoto-card {
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hitokoto-label {
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.6rem;
        }

        .hitokoto-text {
            font-size: 0.9rem;
            font-weight: 300;
            line-height: 1.6;
            color: var(--text-main);
            flex: 1;
        }

        .hitokoto-from {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-align: right;
            margin-top: 0.6rem;
        }

        /* Time Card */
        .time-card {
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .time-date {
            font-size: 0.75rem;
            font-weight: 300;
            color: var(--text-sub);
            margin-bottom: 0.3rem;
            letter-spacing: 1px;
        }

        .time-clock {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--text-main);
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
        }

        .time-weekday {
            font-size: 0.7rem;
            color: var(--accent);
            margin-top: 0.3rem;
            letter-spacing: 1px;
        }

        /* Hitokoto Card */
        .hitokoto-card {
            padding: 0.8rem 1rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hitokoto-label {
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
        }

        .hitokoto-text {
            font-size: 0.95rem;
            font-weight: 300;
            line-height: 1.8;
            color: var(--text-main);
            flex: 1;
        }

        .hitokoto-text.typing::after {
            content: '|';
            animation: cursorBlink 0.7s steps(1) infinite;
            color: var(--accent);
            font-weight: 300;
            margin-left: 1px;
        }

        @keyframes cursorBlink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .hitokoto-from {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-align: right;
            margin-top: 0.8rem;
        }

        /* Time Card */
        .time-card {
            padding: 0.8rem 1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .time-date {
            font-size: 0.78rem;
            font-weight: 300;
            color: var(--text-sub);
            margin-bottom: 0.3rem;
            letter-spacing: 1px;
        }

        .time-clock {
            font-size: 1.6rem;
            font-weight: 300;
            color: var(--text-main);
            letter-spacing: 3px;
            font-variant-numeric: tabular-nums;
        }

        .time-weekday {
            font-size: 0.75rem;
            color: var(--accent);
            margin-top: 0.4rem;
            letter-spacing: 2px;
        }

        /* Section Divider */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0 0.3rem;
        }

        .section-divider i {
            color: var(--text-dim);
            font-size: 0.75rem;
        }

        .section-divider span {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .section-divider::before,
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        }

        /* Link Cards Grid */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.7rem;
        }

        .link-card {
            padding: 0.9rem;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            cursor: pointer;
            display: block;
            transform-style: preserve-3d;
            perspective: 600px;
        }

        .link-card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .link-card:active {
            transform: scale(0.97);
        }

        .link-card i {
            font-size: 1.4rem;
            display: block;
            margin-bottom: 0.6rem;
            transition: color 0.3s;
        }

        .link-card:hover i {
            color: var(--accent);
        }

        .link-card span {
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* ==================== PROGRESS SECTION ==================== */
        .progress-card {
            padding: 1rem 1.2rem;
        }

        .progress-item {
            margin-bottom: 0.5rem;
        }

        .progress-item:last-child {
            margin-bottom: 0;
        }

        .progress-label {
            font-size: 0.7rem;
            color: var(--text-sub);
            margin-bottom: 0.3rem;
            letter-spacing: 0.5px;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background: rgb(255 255 255 / 8%);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--accent), #fcd281);
            transition: width 1s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: -1px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #fcd281;
            box-shadow: 0 0 6px var(--accent-glow);
        }

        /* ==================== FOOTER ==================== */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            text-align: center;
            padding: 0.8rem;
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .footer a {
            color: var(--text-sub);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: var(--accent);
        }

        /* ==================== 访问统计卡片 ==================== */
        .visit-stats-card {
            position: fixed;
            bottom: 40px;          /* 在 footer 上方 */
            right: 16px;
            z-index: 15;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--divider-bg);
            border-radius: var(--radius);
            padding: 14px 18px;
            min-width: 240px;
            max-width: 280px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateY(10px);
            animation: visitStatsFadeIn 0.5s ease forwards;
            animation-delay: 1.2s;    /* 等页面加载动画完成后再出现 */
        }

        @keyframes visitStatsFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .visit-stats-card:hover {
            background: var(--card-hover-bg);
            box-shadow: 0 6px 28px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
        }

        .visit-stats-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            color: var(--text-sub);
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .visit-stats-icon {
            color: var(--accent);
            font-size: 0.85rem;
        }

        .visit-stats-body {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .stat-item > i {
            font-size: 1rem;
            color: var(--accent);
            opacity: 0.7;
        }

        .stat-info {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-dim);
            white-space: nowrap;
        }

        .stat-divider {
            width: 1px;
            height: 36px;
            background: var(--divider-bg);
            flex-shrink: 0;
        }

        /* 计数器数字跳动动画 */
        @keyframes statNumberPop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.25); color: var(--accent); }
            100% { transform: scale(1); }
        }

        .stat-value.pop {
            animation: statNumberPop 0.35s ease;
        }

            100% { transform: scale(1); opacity: 0; }

            position: fixed;
            top: 1.2rem;
            right: 1.2rem;
            z-index: 100;
            width: 44px;
            height: 44px;

<!-- =====================================================
     页面主体内容（Body）
     
     HTML结构层次（从底到顶，按z-index排序）：
       ┌─────────────────────────────────────┐
       │  5. Footer 页脚 (z-index:10)        │ ← 固定在底部
       │  4. 主内容区 Section (z-index:1)    │ ← 左右两栏卡片
       │  3. 背景层 bg-all (z-index:0)       │ ← 图片+遮罩
       │  2. 主题按钮 themeToggle (z:100)    │ ← 固定右上角
       │  1. Loading加载遮罩 (z:99999)       │ ← 加载完成后隐藏
       └─────────────────────────────────────┘
===================================================== -->
<body>

    <!-- ==================== 1. 加载遮罩层（Loading Screen）====================
         页面刚打开时全屏显示的加载动画
         JavaScript 在 window.load 事件后延迟800ms隐藏它
         
         内部结构：
           - .loader 容器：包含3个旋转圆环（CSS 3D动画）
           - .loader-text："LOADING" 文字标签
    -->
    <div id="loading">
        <div class="loader">
            <!-- 三个空的 div 元素 -->
            <!-- CSS 会给它们添加 border 和 animation，形成3D旋转效果 -->
            <!-- 每个圆环只显示一条边框（bottom/right/top），旋转角度不同 -->
            <div class="loader-inner"></div>
            <div class="loader-inner"></div>
            <div class="loader-inner"></div>
        </div>
        <!-- 加载提示文字：显示在圆环下方 -->
        <div class="loader-text">LOADING</div>
    </div>

          alt: 空字符串（装饰性图片无需替代文本）
          onerror: 内联事件处理器 - 图片加载失败时执行JS代码

                   CSS中 .bg-all img.error { display: none } 会隐藏它
        -->
        <img id="bg" src="background7.webp" alt=""
             onerror="this.classList.add('error');">

    <!-- ============================================================
         JavaScript 脚本部分
         
         功能模块（按执行顺序）：
           1. Loading 加载动画隐藏
           2. Background 鼠标视差效果
           3. Time 实时时钟更新
           4. Progress 时间进度条
           5. Greeting 问候语
           6. Hitokoto 一言API + 打字机效果
           7. Footer 年份更新
           8. 小电视动画循环
           9. Theme Toggle 主题切换
          10. 一言点击刷新
          11. Link Cards 3D倾斜
          12. Todo Memo 备忘录功能
    ============================================================ -->
    <script>
        // ==================== 1. Loading 加载动画隐藏 ====================
        // window.load事件：所有资源加载完成后触发
        // 延迟800ms后添加.hide类，CSS过渡实现淡出
        window.addEventListener('load', function () {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hide');
            }, 800);
        });

        // ==================== 2. 鼠标视差背景效果（Parallax）====================
        // IIFE立即执行函数，避免全局变量污染
        // 鼠标移动时背景跟随偏移（最大±6px），营造深度感
        (function() {
            var bg = document.querySelector('.bg-all');
            document.addEventListener('mousemove', function(e) {
                // 归一化鼠标位置到-0.5~0.5，乘以12得到偏移像素
                var x = (e.clientX / window.innerWidth - 0.5) * 12;
                var y = (e.clientY / window.innerHeight - 0.5) * 12;
                bg.style.transition = 'transform 0.3s ease-out';
                bg.style.transform = 'translate(' + x + 'px, ' + y + 'px) scale(1.05)';
            });
        })();

        // ==================== 3. 实时时钟（每秒更新）====================
        // Date: getMonth()返回0-11需+1, getDay():0=周日
        // padStart(2,'0'): 补零如"5"→"05"
        function updateTime() {
            const now = new Date();  // 当前时间对象
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const pad = n => String(n).padStart(2, '0');  // 箭头函数：补零辅助

            // 模板字符串嵌入变量
            document.getElementById('time_date').textContent =
                `${now.getFullYear()} 年 ${now.getMonth() + 1} 月 ${now.getDate()} 日`;
            document.getElementById('time_clock').textContent =
                `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
            document.getElementById('time_weekday').textContent = weekdays[now.getDay()];
        }
        updateTime();                    // 立即执行一次
        setInterval(updateTime, 1000);   // 每1000ms重复

        // ==================== 4. 时间进度条（每分钟更新）====================
        // 计算4个维度进度：日/周/月/年已过百分比
        // 闰年判断：能被4整除且不被100整除，或能被400整除 → 366天
        function updateProgress() {
            const now = new Date();
            const hours = now.getHours() + now.getMinutes() / 60;
            const dayOfWeek = now.getDay() === 0 ? 7 : now.getDay();
            const dayOfMonth = now.getDate();
            const startOfYear = new Date(now.getFullYear(), 0, 1);
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const daysInYear = ((now.getFullYear() % 4 === 0 && now.getFullYear() % 100 !== 0) || now.getFullYear() % 400 === 0) ? 366 : 365;
            const msInDay = 24 * 60 * 60 * 1000;

            const dayPct = (hours / 24 * 100).toFixed(1);
            const weekPct = ((dayOfWeek - 1 + hours / 24) / 7 * 100).toFixed(1);
            const monthPct = ((dayOfMonth - 1 + hours / 24) / daysInMonth * 100).toFixed(1);
            const yearPct = ((now - startOfYear) / (daysInYear * msInDay) * 100).toFixed(1);

            document.getElementById('p_day').textContent = dayPct;
            document.getElementById('p_week').textContent = weekPct;
            document.getElementById('p_month').textContent = monthPct;
            document.getElementById('p_year').textContent = yearPct;

            document.getElementById('pf_day').style.width = dayPct + '%';
            document.getElementById('pf_week').style.width = weekPct + '%';
            document.getElementById('pf_month').style.width = monthPct + '%';
            document.getElementById('pf_year').style.width = yearPct + '%';

            // 详细说明文字
            var passedHours = Math.floor(hours);   // 已过整小时
            document.getElementById('p_day_detail').textContent = '已过 ' + passedHours + ' 小时';
            document.getElementById('p_week_detail').textContent = '第 ' + dayOfWeek + ' 天 / 共 7 天';
            document.getElementById('p_month_detail').textContent = '第 ' + dayOfMonth + ' 天 / 共 ' + daysInMonth + ' 天';

            // 今年第几天：时间差/一天的毫秒数，+1因为第一天是第1天不是第0天
            var dayOfYear = Math.floor((now - startOfYear) / msInDay) + 1;
            document.getElementById('p_year_label').textContent = now.getFullYear() + ' 年';
            // closest('.progress-label'): 向上查找最近的.progress-label元素并修改其HTML
            document.getElementById('p_year').closest('.progress-label').innerHTML =
                '<span>' + now.getFullYear() + ' 年</span>已度过 <span id="p_year">' + yearPct + '</span>% · 第 ' + dayOfYear + ' 天';
        }
        updateProgress();
        setInterval(updateProgress, 60000);

        // 打字机效果定时器变量
        var typeTimer = null;
        
        /**
         * 打字机效果函数
         * @param {HTMLElement} el - 目标DOM元素
         * @param {string} text - 要逐字显示的文字
         * @param {number} speed - 每字间隔毫秒数（默认60）
         */
        function typeText(el, text, speed) {
            if (typeTimer) clearInterval(typeTimer);  // 清除之前的动画
            el.textContent = '';                       // 清空内容
            el.classList.add('typing');                // 添加打字中状态(显示闪烁光标)
            var i = 0;                                 // 字符索引
            typeTimer = setInterval(function() {       // 定时器：每speed毫秒执行一次
                if (i < text.length) {                 // 还有字符未输出
                    el.textContent += text.charAt(i);   // charAt(i)获取第i个字符并追加
                    i++;
                } else {                               // 全部输出完毕
                    clearInterval(typeTimer);           // 清除定时器停止动画
                    typeTimer = null;
                    setTimeout(function() { el.classList.remove('typing'); }, 600);
                    // 延迟600ms移除光标效果（让用户看到末尾光标闪烁）
                }
            }, speed || 60);                           // 默认速度60ms/字
        }

        // ==================== 8. 小电视动画循环 ====================
        // async/await + while(true) 实现无限动作序列
        (function() {
            var body = document.querySelector('.doggo-body');    // 身体容器
            var eyeL = document.querySelector('.doggo-eye-l');   // 左眼
            var eyeR = document.querySelector('.doggo-eye-r');   // 右眼

            // 辅助函数：返回一个延迟指定毫秒的Promise
            function wait(ms) {
                return new Promise(function(r) { setTimeout(r, ms); });
            }

            // 各动作函数：修改CSS transform实现不同姿态
            function peekLeft() { body.style.transform = 'translateX(-3px) rotate(-5deg)'; }   // 左看
            function peekRight() { body.style.transform = 'translateX(3px) rotate(5deg)'; }     // 右看
            function straight() { body.style.transform = 'translateX(0) rotate(0deg) translateY(0)'; }  // 回正
            function tiltHead() { body.style.transform = 'rotate(-12deg)'; }                     // 歪头
            
            // 小跳：应用CSS keyframes动画
            function bounce() {
                body.style.transition = 'none';                                          // 禁用过渡
                body.style.animation = 'dogBounce 0.5s ease';                            // 触发弹跳
                setTimeout(function() {
                    body.style.animation = 'none';                                        // 清除动画
                    body.style.transition = 'transform 0.5s cubic-bezier(0.34,1.56,0.64,1)';  // 恢复过渡
                }, 500);
            }
            // 坏笑
            function smirk() {
                body.style.transform = 'translateX(2px) rotate(5deg) translateY(-2px)';
            }
            // 眯眼
            function squintEyes() {
                eyeL.setAttribute('r', '1');
                eyeR.setAttribute('r', '1');
            }
            // 正常眼
            function normalEyes() {
                eyeL.setAttribute('r', '2.5');
                eyeR.setAttribute('r', '2.5');
            }
            // 大眼
            function bigEyes() {
                eyeL.setAttribute('r', '4');
                eyeR.setAttribute('r', '4');
            }

            async function loop() {
                while (true) {
                    // === 静止，装普通图标 ===
                    straight();
                    normalEyes();
                    await wait(3500);

                    // === 眨眨眼 ===
                    squintEyes();
                    await wait(150);
                    normalEyes();
                    await wait(800);

                    // === 往左看 ===
                    peekLeft();
                    await wait(800);
                    straight();
                    await wait(500);

                    // === 往右看 ===
                    peekRight();
                    await wait(800);
                    straight();
                    await wait(500);

                    // === 歪头 ===
                    tiltHead();
                    normalEyes();
                    await wait(1200);
                    straight();
                    await wait(600);

                    // === 小跳一下 ===
                    bounce();
                    await wait(300);
                    straight();
                    await wait(800);

                    // === 坏笑眯眼 ===
                    smirk();
                    squintEyes();
                    await wait(1500);
                    straight();
                    normalEyes();
                    await wait(3000);
                }
            }

            setTimeout(loop, 2500);
        })();

        // ========== Theme Toggle ==========
        // 主题切换功能（已迁移到后端API存储，支持多端同步）
        // 原方案：仅 localStorage 本地存储（换浏览器/清缓存会丢失）
        // 新方案：通过 PUT /api/settings/theme 保存到 MySQL 数据库
        // 降级策略：API 失败时回退到 localStorage（保证离线可用）
        (function() {
            var toggle = document.getElementById('themeToggle');
            var html = document.documentElement;
            var h = new Date().getHours();
            var isNight = h >= 18 || h < 5;

            // 从服务端加载主题偏好（首次加载），失败则用本地缓存或时间判断
            fetch('/api/settings/theme')
                .then(function(r) { return r.json(); })
                .then(function(res) {
                    if (res.code === 0 && res.data) {
                        applyTheme(res.data.theme);
                    } else {
                        // API 返回异常时使用 localStorage 降级
                        var saved = localStorage.getItem('theme');
                        if (saved === 'light') applyTheme('light');
                        else if (saved === 'dark') applyTheme('dark');
                        else if (!isNight) applyTheme('light'); // 白天默认亮色
                    }
                })
                .catch(function() {
                    // 网络错误时完全降级到原有逻辑
                    var saved = localStorage.getItem('theme');
                    if (saved === 'light') { html.classList.add('light'); toggle.textContent = '☀️'; }
                    else if (saved === 'dark') { toggle.textContent = '🌙'; }
                    else if (!isNight) { html.classList.add('light'); toggle.textContent = '☀️'; }
                });

            // 应用主题的辅助函数
            function applyTheme(theme) {
                if (theme === 'light') {
                    html.classList.add('light');
                    toggle.textContent = '☀️';
                } else {
                    html.classList.remove('light');
                    toggle.textContent = '🌙';
                }
                // 同时写入 localStorage 作为离线缓存
                localStorage.setItem('theme', theme);
            }

            // 点击切换主题
            toggle.addEventListener('click', function(e) {
                var isLight = html.classList.toggle('light');
                var newTheme = isLight ? 'light' : 'dark';
                applyTheme(newTheme);

                // 异步保存到服务端（不阻塞UI）
                fetch('/api/settings/theme', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ theme: newTheme })
                }).catch(function(err) {
                    console.warn('主题保存失败(已降级到本地):', err);
                });

                // 圆形扩散特效
                var ripple = document.createElement('div');
                ripple.className = 'theme-ripple';
                var size = Math.max(window.innerWidth, window.innerHeight) * 2.5;
                var rect = toggle.getBoundingClientRect();
                ripple.style.width = size + 'px';
                ripple.style.height = size + 'px';
                ripple.style.left = (rect.left + rect.width / 2 - size / 2) + 'px';
                ripple.style.top = (rect.top + rect.height / 2 - size / 2) + 'px';
                ripple.style.background = isLight
                    ? 'radial-gradient(circle, rgba(245,238,225,0.5) 0%, rgba(245,238,225,0) 70%)'
                    : 'radial-gradient(circle, rgba(20,20,30,0.5) 0%, rgba(20,20,30,0) 70%)';
                document.body.appendChild(ripple);
                ripple.classList.add('active');
                ripple.addEventListener('animationend', function() { ripple.remove(); });
            });
        })();
