<!DOCTYPE html>
<!-- Updated: 2026-04-01 -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任涵 - 个人主页</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }





        /* ==================== 小电视 ==================== */
        .doggo {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
        }

        .doggo svg {
            width: 100%;
            height: 100%;
        }

        .doggo-body {
            transform-origin: bottom center;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 小跳 */
        @keyframes dogBounce {
            0%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
            60% { transform: translateY(-4px); }
        }








        /* ==================== Dark / Light Theme ==================== */
        :root {
            /* Night Mode — 深色底 + 柔和暖字（小说夜间风格） */
            --bg-cover: rgba(0, 0, 0, 0.4);
            --card-bg: rgb(20 20 30 / 60%);
            --card-hover-bg: rgb(30 30 45 / 65%);
            --text-main: #c8c0b0;
            --text-sub: rgba(200, 192, 176, 0.55);
            --text-dim: rgba(200, 192, 176, 0.35);
            --accent: #e8a86d;
            --accent-glow: rgba(232, 168, 109, 0.25);
            --radius: 6px;
            --social-bg: rgb(255 255 255 / 8%);
            --divider-bg: rgba(255,255,255,0.06);
            --progress-track-bg: rgb(255 255 255 / 6%);
            --avatar-border: rgba(255, 200, 120, 0.2);
        }

        html.light {
            /* Day Mode — 暖白底 + 深棕字（小说白天风格） */
            --bg-cover: rgba(225, 215, 195, 0.7);
            --card-bg: rgb(240 232 218 / 60%);
            --card-hover-bg: rgb(240 232 218 / 72%);
            --text-main: #3b3226;
            --text-sub: rgba(59, 50, 38, 0.6);
            --text-dim: rgba(59, 50, 38, 0.38);
            --accent: #b87333;
            --accent-glow: rgba(184, 115, 51, 0.18);
            --social-bg: rgb(0 0 0 / 5%);
            --divider-bg: rgba(80, 60, 30, 0.1);
            --progress-track-bg: rgb(80 60 30 / 10%);
            --avatar-border: rgba(100, 70, 30, 0.2);
        }

        body {
            transition: background-color 0.6s ease;
        }

        .cards {
            transition: background 0.6s ease, transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Night: 深暖背景 + 低饱和暗图 */
        .bg-all img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(0px) brightness(0.55) saturate(0.8) sepia(0.2);
            transform: scale(1.05);
            animation: bgZoom 20s ease-in-out infinite alternate;
            transition: filter 1s ease;
        }

        /* Day: 暖白覆盖 + 柔和亮图 */
        html.light body {
            background: #f5eee3;
        }

        html.light .bg-all img {
            filter: blur(1px) brightness(1.15) saturate(0.6) sepia(0.15);
        }

        html.light .bg-fallback {
            background: linear-gradient(135deg, #f5eee3 0%, #ede4d3 30%, #f7f0e6 60%, #ebe0ce 100%);
        }

        html.light .avatar-name {
            background: linear-gradient(135deg, #8b5e3c 0%, #b87333 45%, #a0522d 100%);
            -webkit-background-clip: text;
            background-clip: text;
        }

        html.light .loader-inner:nth-child(1) { border-bottom-color: #8b7355; }
        html.light .loader-inner:nth-child(2) { border-right-color: #8b7355; }
        html.light .loader-inner:nth-child(3) { border-top-color: #8b7355; }
        html.light .loader-text { color: #8b7355; }
        html.light #loading { background: #f5eee3; }

        html.light .social-card a {
            background: var(--social-bg);
            color: var(--text-sub);
        }

        html.light .social-card a:hover {
            background: var(--accent);
            color: #fff;
        }

        html.light .section-divider::before,
        html.light .section-divider::after {
            background: linear-gradient(90deg, transparent, var(--divider-bg), transparent);
        }

        html.light .progress-track {
            background: var(--progress-track-bg);
        }

        html.light .name-deco i {
            background: var(--accent);
        }

        html.light .footer {
            color: var(--text-dim);
        }

        html.light .footer a {
            color: var(--text-sub);
        }

        html.light .footer a:hover {
            color: var(--accent);
        }

        html.light .link-card:hover {
            box-shadow: 0 6px 20px rgba(100, 70, 30, 0.12);
        }

        html.light .message-card .fa-quote-left,
        html.light .message-card .fa-quote-right {
            color: var(--accent);
        }

        /* ==================== HITOKOTO CLICK TO REFRESH ==================== */
        .hitokoto-card {
            cursor: pointer;
            user-select: none;
        }

        .hitokoto-card .hitokoto-hint {
            display: none;
            font-size: 0.65rem;
            color: var(--text-dim);
            text-align: right;
            margin-top: 0.4rem;
            opacity: 0.7;
        }

        .hitokoto-card:hover .hitokoto-hint {
            display: block;
        }

        @keyframes hitokotoRefresh {
            0% { opacity: 1; transform: translateY(0); }
            40% { opacity: 0; transform: translateY(-8px); }
            60% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .hitokoto-card.refreshing #hitokoto_text,
        .hitokoto-card.refreshing #hitokoto_from {
            display: inline;
            animation: hitokotoRefresh 0.6s ease forwards;
        }

        .hitokoto-card.refreshing .hitokoto-hint {
            display: none;
        }

        /* 主题切换过渡动画 */
        /* 主题切换动画在 THEME TOGGLE section 定义 */

        html {
            scrollbar-width: none;
        }

        html::-webkit-scrollbar {
            display: none;
        }

        body {
            width: 100%;
            min-height: 100vh;
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
            cursor: default;
        }

        /* ==================== LOADING ==================== */
        #loading {
            position: fixed;
            inset: 0;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #333;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        #loading.hide {
            opacity: 0;
            visibility: hidden;
        }

        .loader {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            perspective: 800px;
        }

        .loader-inner {
            position: absolute;
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .loader-inner:nth-child(1) {
            left: 0; top: 0;
            border-bottom: 2.5px solid #efefef;
            animation: spin1 1s linear infinite;
        }

        .loader-inner:nth-child(2) {
            right: 0; top: 0;
            border-right: 2.5px solid #efefef;
            animation: spin2 1s linear infinite;
        }

        .loader-inner:nth-child(3) {
            right: 0; bottom: 0;
            border-top: 2.5px solid #efefef;
            animation: spin3 1s linear infinite;
        }

        .loader-text {
            position: absolute;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 3px;
            margin-top: 48px;
        }

        @keyframes spin1 { from { transform: rotateX(35deg) rotateY(-45deg) rotateZ(0); } to { transform: rotateX(35deg) rotateY(-45deg) rotateZ(360deg); } }
        @keyframes spin2 { from { transform: rotateX(50deg) rotateY(10deg) rotateZ(0); } to { transform: rotateX(50deg) rotateY(10deg) rotateZ(360deg); } }
        @keyframes spin3 { from { transform: rotateX(35deg) rotateY(55deg) rotateZ(0); } to { transform: rotateX(35deg) rotateY(55deg) rotateZ(360deg); } }

        /* ==================== BACKGROUND ==================== */
        .bg-all {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* .bg-all img already defined in theme section above */

        .bg-all img.error {
            display: none;
        }

        @keyframes bgZoom {
            0% { transform: scale(1.05); }
            100% { transform: scale(1.15); }
        }

        .bg-cover {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.2) 0%, var(--bg-cover) 100%);
        }

        /* fallback gradient when no image */
        .bg-fallback {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 30%, #2c5364 60%, #0f2027 100%);
            z-index: -1;
        }

        /* ==================== SECTION ==================== */
        .section {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* ==================== MAIN CONTAINER ==================== */
        .container {
            max-width: 660px;
            width: 66vw;
            margin: 0 auto;
            animation: fadeBlur 1.2s ease 0.3s both;
        }

        @keyframes fadeBlur {
            0% { opacity: 0; filter: blur(10px); transform: translateY(20px); }
            100% { opacity: 1; filter: blur(0); transform: translateY(0); }
        }

        /* Staggered fade-in animation for cards */
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .col-left .cards:nth-child(1) { animation: slideUp 0.7s ease 0.4s both; }
        .col-left .cards:nth-child(2) { animation: slideUp 0.7s ease 0.55s both; }
        .col-left .cards:nth-child(3) { animation: slideUp 0.7s ease 0.7s both; }

        .col-right .top-row .cards:nth-child(1) { animation: slideUp 0.7s ease 0.45s both; }
        .col-right .top-row .cards:nth-child(2) { animation: slideUp 0.7s ease 0.55s both; }
        .col-right .section-divider:nth-child(2) { animation: slideUp 0.6s ease 0.6s both; }
        .col-right .links-grid { animation: slideUp 0.6s ease 0.65s both; }
        .col-right .section-divider:nth-child(4) { animation: slideUp 0.6s ease 0.95s both; }
        .col-right .progress-card { animation: slideUp 0.7s ease 1s both; }

        .row {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }

        /* ==================== CARDS ==================== */
        .cards {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius);
            transition: all 0.3s ease;
        }

        .cards:hover {
            background: var(--card-hover-bg);
        }

        html.light .cards {
            border: 1px solid rgba(180, 160, 130, 0.25);
            box-shadow: 0 1px 4px rgba(80, 60, 30, 0.06);
        }

        html.light .cards:hover {
            box-shadow: 0 3px 10px rgba(80, 60, 30, 0.1);
            border-color: rgba(180, 160, 130, 0.35);
        }

        /* ==================== LEFT COLUMN ==================== */
        .col-left {
            flex: 0 0 240px;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            position: sticky;
            top: 2rem;
            margin-top: 15vh;
        }

        /* Avatar Card */
        .avatar-card {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            padding: 1rem;
            background: none;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        .avatar-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--avatar-border);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.6s ease;
        }

        .avatar-card:hover .avatar-img {
            transform: scale(1.2);
        }

        .avatar-name {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: 3px;
            margin-bottom: 0.2rem;
            background: linear-gradient(135deg, #f0945e 0%, #ffcc80 45%, #f8b195 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 6px rgba(240, 148, 94, 0.4));
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* 名字右边的装饰花边 */
        .name-deco {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .name-deco i {
            display: inline-block;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.6;
        }

        .name-deco i:nth-child(1) {
            width: 3px;
            height: 3px;
        }

        .name-deco i:nth-child(2) {
            width: 5px;
            height: 5px;
            opacity: 0.5;
        }

        .name-deco i:nth-child(3) {
            width: 4px;
            height: 4px;
            opacity: 0.4;
        }

        .avatar-desc {
            font-size: 0.75rem;
            color: var(--text-sub);
            letter-spacing: 0.5px;
        }

        /* Message Card */
        .message-card {
            padding: 1.2rem 1.4rem;
            position: relative;
        }

        .message-card .fa-quote-left,
        .message-card .fa-quote-right {
            color: var(--accent);
            font-size: 0.7rem;
            opacity: 0.6;
        }

        .message-card .fa-quote-left {
            position: absolute;
            top: 10px;
            left: 12px;
        }

        .message-card .fa-quote-right {
            position: absolute;
            bottom: 10px;
            right: 12px;
        }

        .message-text {
            font-size: 0.85rem;
            font-weight: 300;
            line-height: 1.8;
            color: var(--text-sub);
            padding: 0.3rem 0;
        }

        html.light .message-text {
            color: var(--text-main);
            opacity: 0.9;
        }

        .message-text strong {
            color: var(--text-main);
            font-weight: 500;
        }

        /* Social Card */
        .social-card {
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .social-card a {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            background: var(--social-bg);
            color: var(--text-sub);
            font-size: 1rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-card a:hover {
            background: var(--accent);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        /* ==================== RIGHT COLUMN ==================== */
        .col-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            min-width: 0;
            margin-top: 15vh;
        }

        /* Top Row: Hitokoto + Time */
        .top-row {
            display: flex;
            gap: 0.8rem;
        }

        .top-row > * {
            flex: 1;
        }

        /* Hitokoto Card */
        .hitokoto-card {
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hitokoto-label {
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.6rem;
        }

        .hitokoto-text {
            font-size: 0.9rem;
            font-weight: 300;
            line-height: 1.6;
            color: var(--text-main);
            flex: 1;
        }

        .hitokoto-from {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-align: right;
            margin-top: 0.6rem;
        }

        /* Time Card */
        .time-card {
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .time-date {
            font-size: 0.75rem;
            font-weight: 300;
            color: var(--text-sub);
            margin-bottom: 0.3rem;
            letter-spacing: 1px;
        }

        .time-clock {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--text-main);
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
        }

        .time-weekday {
            font-size: 0.7rem;
            color: var(--accent);
            margin-top: 0.3rem;
            letter-spacing: 1px;
        }

        /* Hitokoto Card */
        .hitokoto-card {
            padding: 0.8rem 1rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hitokoto-label {
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
        }

        .hitokoto-text {
            font-size: 0.95rem;
            font-weight: 300;
            line-height: 1.8;
            color: var(--text-main);
            flex: 1;
        }

        .hitokoto-text.typing::after {
            content: '|';
            animation: cursorBlink 0.7s steps(1) infinite;
            color: var(--accent);
            font-weight: 300;
            margin-left: 1px;
        }

        @keyframes cursorBlink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .hitokoto-from {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-align: right;
            margin-top: 0.8rem;
        }

        /* Time Card */
        .time-card {
            padding: 0.8rem 1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .time-date {
            font-size: 0.78rem;
            font-weight: 300;
            color: var(--text-sub);
            margin-bottom: 0.3rem;
            letter-spacing: 1px;
        }

        .time-clock {
            font-size: 1.6rem;
            font-weight: 300;
            color: var(--text-main);
            letter-spacing: 3px;
            font-variant-numeric: tabular-nums;
        }

        .time-weekday {
            font-size: 0.75rem;
            color: var(--accent);
            margin-top: 0.4rem;
            letter-spacing: 2px;
        }

        /* Section Divider */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0 0.3rem;
        }

        .section-divider i {
            color: var(--text-dim);
            font-size: 0.75rem;
        }

        .section-divider span {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .section-divider::before,
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        }

        /* Link Cards Grid */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.7rem;
        }

        .link-card {
            padding: 0.9rem;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            cursor: pointer;
            display: block;
            transform-style: preserve-3d;
            perspective: 600px;
        }

        .link-card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .link-card:active {
            transform: scale(0.97);
        }

        .link-card i {
            font-size: 1.4rem;
            display: block;
            margin-bottom: 0.6rem;
            transition: color 0.3s;
        }

        .link-card:hover i {
            color: var(--accent);
        }

        .link-card span {
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* ==================== PROGRESS SECTION ==================== */
        .progress-card {
            padding: 1rem 1.2rem;
        }

        .progress-item {
            margin-bottom: 0.5rem;
        }

        .progress-item:last-child {
            margin-bottom: 0;
        }

        .progress-label {
            font-size: 0.7rem;
            color: var(--text-sub);
            margin-bottom: 0.3rem;
            letter-spacing: 0.5px;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background: rgb(255 255 255 / 8%);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--accent), #fcd281);
            transition: width 1s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: -1px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #fcd281;
            box-shadow: 0 0 6px var(--accent-glow);
        }

        /* ==================== FOOTER ==================== */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            text-align: center;
            padding: 0.8rem;
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .footer a {
            color: var(--text-sub);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: var(--accent);
        }

        /* ==================== THEME TOGGLE ==================== */
        .theme-ripple {
            position: fixed;
            z-index: 99;
            border-radius: 50%;
            pointer-events: none;
            transform: scale(0);
        }

        .theme-ripple.active {
            animation: rippleExpand 0.65s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes rippleExpand {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        .theme-toggle {
            position: fixed;
            top: 1.2rem;
            right: 1.2rem;
            z-index: 100;
            width: 44px;
            height: 44px;
            border-radius: 50%;

            align-items: center;
            justify-content: center;

            color: var(--text-main);

            animation: slideUp 0.6s ease 1.2s forwards;

        .theme-toggle:hover {
            transform: scale(1.15) rotate(15deg);

            transform: scale(0.9) rotate(-10deg);

        html.light .theme-toggle {
            border-color: rgba(80, 60, 30, 0.15);

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 768px) {

                padding: 1rem;
                align-items: flex-start;
                padding-top: 1.5rem;
                padding-bottom: 3rem;

                flex-direction: column;
            }

            .col-left {

                position: static;

                align-items: center;
                gap: 1rem;
                text-align: left;
                padding: 1.2rem;

            .avatar-img {
                width: 60px;
                height: 60px;
                margin-bottom: 0;
            }

            .top-row {
                flex-direction: column;
            }

            .links-grid {
                grid-template-columns: repeat(2, 1fr);

            .time-clock {
                font-size: 1.6rem;
            }

                min-height: auto;
                padding: 1.2rem;
            }

        /* ==================== TODO MEMO (备忘录) ==================== */
        .progress-card {
            position: relative;
        }

        .todo-toggle {
            position: absolute;
            top: 0.6rem;
            right: 0.8rem;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--social-bg);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            color: var(--text-sub);
            transition: all 0.3s ease;
            z-index: 20;
        }

        .todo-toggle:hover {
            background: var(--accent);
            color: #fff;
            transform: scale(1.15);
        }

        .todo-toggle .todo-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            background: #e74c3c;
            color: #fff;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            font-weight: 500;
        }

        .todo-badge:empty,
        .todo-badge[data-count="0"] {
            display: none;
        }

        /* --- 备忘录面板：从图标右侧弹出 --- */
        .todo-panel {
            position: absolute;
            top: -0.5rem;
            right: calc(100% - 1rem);
            width: 280px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease, transform 0.3s ease;
            opacity: 0;
            transform: translateX(12px) scale(0.96);
            transform-origin: top right;
            background: var(--card-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: var(--radius);
            border: 1px solid var(--divider-bg);
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            z-index: 19;
            pointer-events: none;
        }

        .todo-panel.open {
            max-height: 520px;
            opacity: 1;
            transform: translateX(0) scale(1);
            pointer-events: auto;
            padding: 0.8rem;
        }

        html.light .todo-panel {
            border-color: rgba(180, 160, 130, 0.3);
            box-shadow: 0 8px 32px rgba(80, 60, 30, 0.12);
        }

        .todo-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .todo-panel-title {
            font-size: 0.8rem;
            color: var(--text-main);
            font-weight: 500;
            letter-spacing: 1px;
        }

        .todo-history-btn {
            border: none;
            background: var(--social-bg);
            color: var(--text-sub);
            font-size: 0.7rem;
            padding: 0.25rem 0.6rem;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .todo-history-btn:hover {
            background: var(--accent);
            color: #fff;
        }

        .todo-tabs {
            display: flex;
            gap: 0.3rem;
            margin-bottom: 0.5rem;
        }

        .todo-tab {
            flex: 1;
            padding: 0.3rem 0;
            border: none;
            border-radius: var(--radius);
            background: var(--social-bg);
            color: var(--text-sub);
            font-size: 0.68rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .todo-tab.active {
            background: var(--accent);
            color: #fff;
        }

        .todo-tab:hover:not(.active) {
            background: var(--card-hover-bg);
            color: var(--text-main);
        }

        .todo-input-row {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 0.5rem;
        }

        .todo-input {
            flex: 1;
            padding: 0.35rem 0.6rem;
            border: 1px solid var(--divider-bg);
            border-radius: var(--radius);
            background: var(--social-bg);
            color: var(--text-main);
            font-size: 0.75rem;
            outline: none;
            transition: border-color 0.25s ease;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .todo-input::placeholder {
            color: var(--text-dim);
        }

        .todo-input:focus {
            border-color: var(--accent);
        }

        .todo-add-btn {
            padding: 0.35rem 0.6rem;
            border: none;
            border-radius: var(--radius);
            background: var(--accent);
            color: #fff;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .todo-add-btn:hover {
            opacity: 0.85;
            transform: scale(1.05);
        }

        .todo-list {
            max-height: 240px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--text-dim) transparent;
        }

        .todo-list::-webkit-scrollbar {
            width: 3px;
        }

        .todo-list::-webkit-scrollbar-thumb {
            background: var(--text-dim);
            border-radius: 3px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.35rem 0.2rem;
            border-radius: var(--radius);
            transition: background 0.2s ease;
            animation: todoSlideIn 0.3s ease both;
        }

        @keyframes todoSlideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .todo-item:hover {
            background: var(--social-bg);
        }

        .todo-check {
            width: 16px;
            height: 16px;
            min-width: 16px;
            border-radius: 50%;
            border: 1.5px solid var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            font-size: 0.55rem;
            color: transparent;
        }

        .todo-check:hover {
            border-color: var(--accent);
        }

        .todo-item.done .todo-check {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .todo-text {
            flex: 1;
            font-size: 0.75rem;
            color: var(--text-main);
            line-height: 1.4;
            word-break: break-word;
        }

        .todo-item.done .todo-text {
            text-decoration: line-through;
            color: var(--text-dim);
        }

        .todo-text-input {
            flex: 1;
            padding: 0.2rem 0.4rem;
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            background: var(--social-bg);
            color: var(--text-main);
            font-size: 0.75rem;
            outline: none;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .todo-del {
            width: 20px;
            height: 20px;
            min-width: 20px;
            border: none;
            border-radius: 50%;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .todo-item:hover .todo-del {
            opacity: 1;
        }

        .todo-del:hover {
            background: #e74c3c;
            color: #fff;
        }

        .todo-empty {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-dim);
            padding: 0.8rem 0;
            letter-spacing: 1px;
        }

        .todo-count {
            font-size: 0.6rem;
            color: var(--text-dim);
            text-align: right;
            margin-top: 0.3rem;
        }

        /* --- 历史日记面板（覆盖在备忘录面板上方） --- */
        .todo-history {
            position: absolute;
            top: -0.5rem;
            right: calc(100% - 1rem);
            width: 300px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease, transform 0.3s ease;
            opacity: 0;
            transform: translateX(12px) scale(0.96);
            transform-origin: top right;
            background: var(--card-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: var(--radius);
            border: 1px solid var(--divider-bg);
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            z-index: 21;
            pointer-events: none;
        }

        .todo-history.open {
            max-height: 520px;
            opacity: 1;
            transform: translateX(0) scale(1);
            pointer-events: auto;
            padding: 0.8rem;
        }

        html.light .todo-history {
            border-color: rgba(180, 160, 130, 0.3);
            box-shadow: 0 8px 32px rgba(80, 60, 30, 0.12);
        }

        .todo-history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.6rem;
        }

        .todo-history-title {
            font-size: 0.8rem;
            color: var(--text-main);
            font-weight: 500;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .todo-history-title i {
            color: var(--accent);
            font-size: 0.75rem;
        }

        .todo-history-back {
            border: none;
            background: var(--social-bg);
            color: var(--text-sub);
            font-size: 0.68rem;
            padding: 0.25rem 0.6rem;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .todo-history-back:hover {
            background: var(--accent);
            color: #fff;
        }

        .todo-history-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .todo-history-nav-btn {
            border: none;
            background: var(--social-bg);
            color: var(--text-sub);
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            transition: all 0.2s ease;
        }

        .todo-history-nav-btn:hover {
            background: var(--accent);
            color: #fff;
        }

        .todo-history-nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .todo-history-date {
            font-size: 0.78rem;
            color: var(--text-main);
            font-weight: 400;
            letter-spacing: 1px;
            min-width: 120px;
            text-align: center;
        }

        .todo-history-section {
            margin-bottom: 0.6rem;
        }

        .todo-history-section-title {
            font-size: 0.68rem;
            color: var(--accent);
            letter-spacing: 1px;
            margin-bottom: 0.3rem;
            padding-bottom: 0.2rem;
            border-bottom: 1px solid var(--divider-bg);
        }

        .todo-history-item {
            font-size: 0.72rem;
            color: var(--text-sub);
            padding: 0.2rem 0;
            line-height: 1.4;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .todo-history-item .done-mark {
            color: var(--accent);
            font-size: 0.65rem;
        }

        .todo-history-item .undone-mark {
            color: var(--text-dim);
            font-size: 0.65rem;
        }

        .todo-history-item .item-done {
            text-decoration: line-through;
            color: var(--text-dim);
        }

        .todo-history-summary {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-align: center;
            padding: 0.3rem 0;
            letter-spacing: 0.5px;
        }

        .todo-history-empty {
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-dim);
            padding: 1.5rem 0;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .todo-panel, .todo-history {
                right: -10px;
                width: calc(100vw - 40px);
                max-width: 320px;
            }
            .todo-panel.open { max-height: 400px; }
            .todo-history.open { max-height: 400px; }
            .todo-list { max-height: 200px; }
        }
    </style>
</head>

                                <button class="todo-tab" data-tab="study">学习</button>
                                <button class="todo-tab" data-tab="important">*** 重要</button>
                            </div>
                            <div class="todo-input-row">
                                <input type="text" class="todo-input" id="todoInput" placeholder="输入新事项..." maxlength="100">
                                <button class="todo-add-btn" id="todoAddBtn" title="添加"><i class="fa-solid fa-plus"></i></button>
                            </div>
                            <div class="todo-list" id="todoList"></div>
                            <div class="todo-count" id="todoCount"></div>
                        </div>

                        <!-- 历史日记面板（覆盖在备忘录面板之上） -->
                        <div class="todo-history" id="todoHistory">
                            <div class="todo-history-header">
                                <span class="todo-history-title"><i class="fa-solid fa-box-archive"></i> 归档箱</span>
                                <button class="todo-history-back" id="todoHistoryBack">返回</button>
                            </div>
                            <div class="todo-history-nav">
                                <button class="todo-history-nav-btn" id="histPrev" title="前一天"><i class="fa-solid fa-chevron-left"></i></button>
                                <span class="todo-history-date" id="histDate"></span>
                                <button class="todo-history-nav-btn" id="histNext" title="后一天"><i class="fa-solid fa-chevron-right"></i></button>
                            </div>
                            <div id="histContent"></div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <span>Copyright &copy; <span id="footer_year"></span> 任涵</span>
        &ensp;·&ensp;
        <span>一个热爱代码的学生</span>
    </footer>

    <script>
        // ========== Loading ==========
        window.addEventListener('load', function () {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hide');
            }, 800);
        });

        // ========== Background Parallax ==========
        (function() {
            var bg = document.querySelector('.bg-all');
            document.addEventListener('mousemove', function(e) {
                var x = (e.clientX / window.innerWidth - 0.5) * 12;
                var y = (e.clientY / window.innerHeight - 0.5) * 12;
                bg.style.transition = 'transform 0.3s ease-out';
                bg.style.transform = 'translate(' + x + 'px, ' + y + 'px) scale(1.05)';
            });
        })();

        // ========== Time ==========
        function updateTime() {
            const now = new Date();
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const pad = n => String(n).padStart(2, '0');

            document.getElementById('time_date').textContent =
                `${now.getFullYear()} 年 ${now.getMonth() + 1} 月 ${now.getDate()} 日`;
            document.getElementById('time_clock').textContent =
                `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
            document.getElementById('time_weekday').textContent = weekdays[now.getDay()];
        }
        updateTime();
        setInterval(updateTime, 1000);

        // ========== Progress ==========
        function updateProgress() {
            const now = new Date();
            const hours = now.getHours() + now.getMinutes() / 60;
            const dayOfWeek = now.getDay() === 0 ? 7 : now.getDay();
            const dayOfMonth = now.getDate();
            const startOfYear = new Date(now.getFullYear(), 0, 1);
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const daysInYear = ((now.getFullYear() % 4 === 0 && now.getFullYear() % 100 !== 0) || now.getFullYear() % 400 === 0) ? 366 : 365;
            const msInDay = 24 * 60 * 60 * 1000;

            const dayPct = (hours / 24 * 100).toFixed(1);
            const weekPct = ((dayOfWeek - 1 + hours / 24) / 7 * 100).toFixed(1);
            const monthPct = ((dayOfMonth - 1 + hours / 24) / daysInMonth * 100).toFixed(1);
            const yearPct = ((now - startOfYear) / (daysInYear * msInDay) * 100).toFixed(1);

            document.getElementById('p_day').textContent = dayPct;
            document.getElementById('p_week').textContent = weekPct;
            document.getElementById('p_month').textContent = monthPct;
            document.getElementById('p_year').textContent = yearPct;

            document.getElementById('pf_day').style.width = dayPct + '%';
            document.getElementById('pf_week').style.width = weekPct + '%';
            document.getElementById('pf_month').style.width = monthPct + '%';
            document.getElementById('pf_year').style.width = yearPct + '%';

            // 具体数值
            var passedHours = Math.floor(hours);
            var remainHours = 24 - passedHours;
            document.getElementById('p_day_detail').textContent = '已过 ' + passedHours + ' 小时';

            var passedWeekDays = dayOfWeek - 1;
            document.getElementById('p_week_detail').textContent = '第 ' + dayOfWeek + ' 天 / 共 7 天';

            document.getElementById('p_month_detail').textContent = '第 ' + dayOfMonth + ' 天 / 共 ' + daysInMonth + ' 天';

            var dayOfYear = Math.floor((now - startOfYear) / msInDay) + 1;
            document.getElementById('p_year_label').textContent = now.getFullYear() + ' 年';
            document.getElementById('p_year').closest('.progress-label').innerHTML =
                '<span>' + now.getFullYear() + ' 年</span>已度过 <span id="p_year">' + yearPct + '</span>% · 第 ' + dayOfYear + ' 天';
        }
        updateProgress();
        setInterval(updateProgress, 60000);

        // ========== Greeting ==========
        (function() {
            var h = new Date().getHours();
            var text = '你好 !';
            if (h >= 5 && h < 12) text = '早上好 ! ☀️';
            else if (h >= 12 && h < 14) text = '中午好 ! 🌤️';
            else if (h >= 14 && h < 18) text = '下午好 ! 🌅';
            else if (h >= 18 && h < 22) text = '晚上好 ! 🌙';
            else text = '夜深了 ! 💤';
            document.getElementById('greeting_text').textContent = text;
        })();

        // ========== Hitokoto ==========
        var typeTimer = null;
        function typeText(el, text, speed) {
            if (typeTimer) clearInterval(typeTimer);
            el.textContent = '';
            el.classList.add('typing');
            var i = 0;
            typeTimer = setInterval(function() {
                if (i < text.length) {
                    el.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(typeTimer);
                    typeTimer = null;
                    setTimeout(function() { el.classList.remove('typing'); }, 600);
                }
            }, speed || 60);
        }

        function fetchHitokoto(isRefresh) {
            fetch('https://v1.hitokoto.cn/?c=a&c=b&c=d&c=i&c=k')
                .then(r => r.json())
                .then(data => {
                    var textEl = document.getElementById('hitokoto_text');
                    if (isRefresh) {
                        typeText(textEl, data.hitokoto, 50);
                    } else {
                        textEl.textContent = data.hitokoto;
                    }
                    document.getElementById('hitokoto_from').textContent = data.from || '無名';
                })
                .catch(() => {});
        }
        fetchHitokoto(false);
        setInterval(function() { fetchHitokoto(true); }, 30000);

        // ========== Footer Year ==========
        document.getElementById('footer_year').textContent = new Date().getFullYear();

        // ========== 小电视动作 ==========
        (function() {
            var body = document.querySelector('.doggo-body');
            var eyeL = document.querySelector('.doggo-eye-l');
            var eyeR = document.querySelector('.doggo-eye-r');

            function wait(ms) {
                return new Promise(function(r) { setTimeout(r, ms); });
            }

            // 往左看
            function peekLeft() {
                body.style.transform = 'translateX(-3px) rotate(-5deg)';
            }
            // 往右看
            function peekRight() {
                body.style.transform = 'translateX(3px) rotate(5deg)';
            }
            // 回正
            function straight() {
                body.style.transform = 'translateX(0) rotate(0deg) translateY(0)';
            }
            // 歪头
            function tiltHead() {
                body.style.transform = 'rotate(-12deg)';
            }
            // 小跳
            function bounce() {
                body.style.transition = 'none';
                body.style.animation = 'dogBounce 0.5s ease';
                setTimeout(function() {
                    body.style.animation = 'none';
                    body.style.transition = 'transform 0.5s cubic-bezier(0.34,1.56,0.64,1)';
                }, 500);
            }
            // 坏笑
            function smirk() {
                body.style.transform = 'translateX(2px) rotate(5deg) translateY(-2px)';
            }
            // 眯眼
            function squintEyes() {
                eyeL.setAttribute('r', '1');
                eyeR.setAttribute('r', '1');
            }
            // 正常眼
            function normalEyes() {
                eyeL.setAttribute('r', '2.5');
                eyeR.setAttribute('r', '2.5');
            }
            // 大眼
            function bigEyes() {
                eyeL.setAttribute('r', '4');
                eyeR.setAttribute('r', '4');
            }

            async function loop() {
                while (true) {
                    // === 静止，装普通图标 ===
                    straight();
                    normalEyes();
                    await wait(3500);

                    // === 眨眨眼 ===
                    squintEyes();
                    await wait(150);
                    normalEyes();
                    await wait(800);

                    // === 往左看 ===
                    peekLeft();
                    await wait(800);
                    straight();
                    await wait(500);

                    // === 往右看 ===
                    peekRight();
                    await wait(800);
                    straight();
                    await wait(500);

                    // === 歪头 ===
                    tiltHead();
                    normalEyes();
                    await wait(1200);
                    straight();
                    await wait(600);

                    // === 小跳一下 ===
                    bounce();
                    await wait(300);
                    straight();
                    await wait(800);

                    // === 坏笑眯眼 ===
                    smirk();
                    squintEyes();
                    await wait(1500);
                    straight();
                    normalEyes();
                    await wait(3000);
                }
            }

            setTimeout(loop, 2500);
        })();

        // ========== Theme Toggle ==========
        (function() {
            var toggle = document.getElementById('themeToggle');
            var html = document.documentElement;
            var saved = localStorage.getItem('theme');
            var h = new Date().getHours();
            // 18:00-4:59 晚间默认暗色，5:00-17:59 白天默认亮色
            var isNight = h >= 18 || h < 5;

            if (saved === 'light') {
                html.classList.add('light');
                toggle.textContent = '☀️';
            } else if (saved === 'dark') {
                html.classList.remove('light');
                toggle.textContent = '🌙';
            } else {
                if (!isNight) {
                    html.classList.add('light');
                    toggle.textContent = '☀️';
                }
            }

            toggle.addEventListener('click', function(e) {
                var isLight = html.classList.toggle('light');
                toggle.textContent = isLight ? '☀️' : '🌙';
                localStorage.setItem('theme', isLight ? 'light' : 'dark');

                // 圆形扩散特效
                var ripple = document.createElement('div');
                ripple.className = 'theme-ripple';
                var size = Math.max(window.innerWidth, window.innerHeight) * 2.5;
                var rect = toggle.getBoundingClientRect();
                var cx = rect.left + rect.width / 2;
                var cy = rect.top + rect.height / 2;
                ripple.style.width = size + 'px';
                ripple.style.height = size + 'px';
                ripple.style.left = (cx - size / 2) + 'px';
                ripple.style.top = (cy - size / 2) + 'px';
                ripple.style.background = isLight
                    ? 'radial-gradient(circle, rgba(245,238,225,0.5) 0%, rgba(245,238,225,0) 70%)'
                    : 'radial-gradient(circle, rgba(20,20,30,0.5) 0%, rgba(20,20,30,0) 70%)';
                document.body.appendChild(ripple);
                ripple.classList.add('active');
                ripple.addEventListener('animationend', function() {
                    ripple.remove();
                });
            });
        })();

        // ========== Hitokoto Click to Refresh ==========
        document.querySelector('.hitokoto-card').addEventListener('click', function() {
            var card = this;
            if (card.classList.contains('refreshing')) return;
            card.classList.add('refreshing');
            fetch('https://v1.hitokoto.cn/?c=a&c=b&c=d&c=i&c=k')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    typeText(document.getElementById('hitokoto_text'), data.hitokoto, 50);
                    document.getElementById('hitokoto_from').textContent = data.from || '無名';
                })
                .catch(function() {})
                .finally(function() {
                    setTimeout(function() { card.classList.remove('refreshing'); }, 600);
                });
        });

        // ========== Link Cards 3D Tilt ==========
        (function() {
            var cards = document.querySelectorAll('.link-card');
            cards.forEach(function(card) {
                card.addEventListener('mousemove', function(e) {
                    var rect = card.getBoundingClientRect();
                    var x = e.clientX - rect.left;
                    var y = e.clientY - rect.top;
                    var cx = rect.width / 2;
                    var cy = rect.height / 2;
                    var rotateX = (y - cy) / cy * -10;
                    var rotateY = (x - cx) / cx * 10;
                    card.style.transition = 'transform 0.1s ease, box-shadow 0.3s ease';
                    card.style.transform = 'perspective(600px) rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg) translateY(-3px)';
                });
                card.addEventListener('mouseleave', function() {
                    card.style.transition = 'transform 0.4s ease, box-shadow 0.3s ease';
                    card.style.transform = 'perspective(600px) rotateX(0) rotateY(0) translateY(0)';
                });
            });
        })();

        // ========== Todo Memo (备忘录) ==========
        (function() {
            var STORAGE_KEY = 'tinyWeb1_todos';
            var HISTORY_KEY = 'tinyWeb1_history';
            var ARCHIVE_DATE_KEY = 'tinyWeb1_archiveDate';
            var currentTab = 'life'; // 'life' | 'study' | 'important'
            var historyDate = null; // 当前查看的历史日期 YYYY-MM-DD

            var toggleBtn = document.getElementById('todoToggle');
            var panel = document.getElementById('todoPanel');
            var input = document.getElementById('todoInput');
            var addBtn = document.getElementById('todoAddBtn');
            var listEl = document.getElementById('todoList');
            var countEl = document.getElementById('todoCount');
            var badge = document.getElementById('todoBadge');
            var tabs = document.querySelectorAll('.todo-tab');
            var historyBtn = document.getElementById('todoHistoryBtn');
            var historyPanel = document.getElementById('todoHistory');
            var historyBack = document.getElementById('todoHistoryBack');
            var histDateEl = document.getElementById('histDate');
            var histContent = document.getElementById('histContent');
            var histPrev = document.getElementById('histPrev');
            var histNext = document.getElementById('histNext');

            var tabNames = { life: '生活', study: '学习', important: '*** 重要' };

            // --- 数据操作 ---
            function loadTodos() {
                try {
                    var data = JSON.parse(localStorage.getItem(STORAGE_KEY));
                    return data || { life: [], study: [], important: [] };
                } catch(e) {
                    return { life: [], study: [], important: [] };
                }
            }

            function saveTodos(data) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }

            function getTodos() {
                return loadTodos()[currentTab] || [];
            }

            function setTodos(arr) {
                var data = loadTodos();
                data[currentTab] = arr;
                saveTodos(data);
            }

            // --- 历史归档 ---
            function loadHistory() {
                try {
                    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || {};
                } catch(e) { return {}; }
            }

            function saveHistory(hist) {
                localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
            }

            function getTodayStr() {
                var d = new Date();
                return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
            }

            function formatDateCN(dateStr) {
                var parts = dateStr.split('-');
                return parts[0] + ' 年 ' + parseInt(parts[1]) + ' 月 ' + parseInt(parts[2]) + ' 日';
            }

            function prevDay(dateStr) {
                var d = new Date(dateStr);
                d.setDate(d.getDate() - 1);
                return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
            }

            function nextDay(dateStr) {
                var d = new Date(dateStr);
                d.setDate(d.getDate() + 1);
                return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
            }

            // 每天 00:00 自动归档当天任务
            function checkAndArchive() {
                var today = getTodayStr();
                var lastArchive = localStorage.getItem(ARCHIVE_DATE_KEY);
                if (lastArchive !== today) {
                    // 归档当前任务到前一天
                    var archiveDate = lastArchive ? prevDay(lastArchive) : prevDay(today);
                    // 如果之前没归档过，归档今天之前的数据
                    var todos = loadTodos();
                    var hasContent = (todos.life && todos.life.length > 0)
                                  || (todos.study && todos.study.length > 0)
                                  || (todos.important && todos.important.length > 0);
                    if (hasContent) {
                        var hist = loadHistory();
                        // 只保存有内容的分类
                        hist[archiveDate] = {};
                        if (todos.life && todos.life.length > 0) hist[archiveDate].life = JSON.parse(JSON.stringify(todos.life));
                        if (todos.study && todos.study.length > 0) hist[archiveDate].study = JSON.parse(JSON.stringify(todos.study));
                        if (todos.important && todos.important.length > 0) hist[archiveDate].important = JSON.parse(JSON.stringify(todos.important));
                        saveHistory(hist);
                    }
                    localStorage.setItem(ARCHIVE_DATE_KEY, today);
                }
            }

            // 每分钟检查一次是否跨天
            setInterval(checkAndArchive, 60000);
            checkAndArchive();

            // --- 渲染任务列表 ---
            function render() {
                var todos = getTodos();
                listEl.innerHTML = '';

                if (todos.length === 0) {
                    listEl.innerHTML = '<div class="todo-empty">暂无事项，添加一个吧</div>';
                } else {
                    todos.forEach(function(todo, idx) {
                        var item = document.createElement('div');
                        item.className = 'todo-item' + (todo.done ? ' done' : '');

                        var check = document.createElement('span');
                        check.className = 'todo-check';
                        check.innerHTML = '<i class="fa-solid fa-check"></i>';
                        check.addEventListener('click', function() { toggleDone(idx); });

                        var text = document.createElement('span');
                        text.className = 'todo-text';
                        text.textContent = todo.text;
                        text.addEventListener('dblclick', function() { startEdit(item, idx, todo.text); });

                        var del = document.createElement('button');
                        del.className = 'todo-del';
                        del.innerHTML = '<i class="fa-solid fa-xmark"></i>';
                        del.addEventListener('click', function() { removeTodo(idx); });

                        item.appendChild(check);
                        item.appendChild(text);
                        item.appendChild(del);
                        listEl.appendChild(item);
                    });
                }

                var done = todos.filter(function(t) { return t.done; }).length;
                var total = todos.length;
                var pending = total - done;
                countEl.textContent = total > 0
                    ? '共 ' + total + ' 项 · 已完成 ' + done + ' · 未完成 ' + pending
                    : '';

                // 更新 badge
                var allTodos = loadTodos();
                var allPending = (allTodos.life || []).filter(function(t) { return !t.done; }).length
                              + (allTodos.study || []).filter(function(t) { return !t.done; }).length
                              + (allTodos.important || []).filter(function(t) { return !t.done; }).length;
                badge.textContent = allPending > 0 ? allPending : '';
                badge.dataset.count = allPending;
            }

            // --- 历史日记渲染 ---
            function renderHistory() {
                if (!historyDate) {
                    historyDate = getTodayStr();
                }
                histDateEl.textContent = formatDateCN(historyDate);

                var hist = loadHistory();
                var dayData = hist[historyDate];
                histContent.innerHTML = '';

                if (!dayData) {
                    histContent.innerHTML = '<div class="todo-history-empty">这一天没有归档记录</div>';
                } else {
                    var totalDone = 0;
                    var totalAll = 0;
                    ['life', 'study', 'important'].forEach(function(cat) {
                        if (dayData[cat] && dayData[cat].length > 0) {
                            var section = document.createElement('div');
                            section.className = 'todo-history-section';
                            var title = document.createElement('div');
                            title.className = 'todo-history-section-title';
                            title.textContent = tabNames[cat];
                            section.appendChild(title);

                            dayData[cat].forEach(function(item) {
                                totalAll++;
                                if (item.done) totalDone++;
                                var row = document.createElement('div');
                                row.className = 'todo-history-item';
                                var mark = document.createElement('i');
                                if (item.done) {
                                    mark.className = 'done-mark fa-solid fa-circle-check';
                                    row.appendChild(mark);
                                } else {
                                    mark.className = 'undone-mark fa-regular fa-circle';
                                    row.appendChild(mark);
                                }
                                var txt = document.createElement('span');
                                txt.textContent = item.text;
                                if (item.done) txt.className = 'item-done';
                                row.appendChild(txt);
                                section.appendChild(row);
                            });
                            histContent.appendChild(section);
                        }
                    });

                    if (totalAll > 0) {
                        var summary = document.createElement('div');
                        summary.className = 'todo-history-summary';
                        summary.textContent = '完成 ' + totalDone + ' / ' + totalAll + ' 项';
                        histContent.appendChild(summary);
                    }
                }

                // 控制前后按钮：不能超过今天
                var today = getTodayStr();
                histNext.disabled = historyDate >= today;
            }

            // --- 添加 ---
            function addTodo(text) {
                text = text.trim();
                if (!text) return;
                var todos = getTodos();
                todos.push({ text: text, done: false });
                setTodos(todos);
                input.value = '';
                render();
            }

            function toggleDone(idx) {
                var todos = getTodos();
                todos[idx].done = !todos[idx].done;
                setTodos(todos);
                render();
            }

            function removeTodo(idx) {
                var todos = getTodos();
                todos.splice(idx, 1);
                setTodos(todos);
                render();
            }

            function startEdit(item, idx, oldText) {
                var textEl = item.querySelector('.todo-text');
                var inputEl = document.createElement('input');
                inputEl.type = 'text';
                inputEl.className = 'todo-text-input';
                inputEl.value = oldText;
                inputEl.maxLength = 100;
                textEl.replaceWith(inputEl);
                inputEl.focus();
                inputEl.select();

                function finishEdit() {
                    var newText = inputEl.value.trim();
                    if (newText && newText !== oldText) {
                        var todos = getTodos();
                        todos[idx].text = newText;
                        setTodos(todos);
                    }
                    render();
                }

                inputEl.addEventListener('blur', finishEdit);
                inputEl.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') { inputEl.blur(); }
                    if (e.key === 'Escape') { inputEl.value = oldText; inputEl.blur(); }
                });
            }

            // --- 事件绑定 ---
            // 展开/收起备忘录面板
            toggleBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (historyPanel.classList.contains('open')) {
                    historyPanel.classList.remove('open');
                }
                panel.classList.toggle('open');
            });

            // 打开历史归档
            historyBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                historyDate = getTodayStr();
                renderHistory();
                panel.classList.remove('open');
                historyPanel.classList.add('open');
            });

            // 返回备忘录
            historyBack.addEventListener('click', function(e) {
                e.stopPropagation();
                historyPanel.classList.remove('open');
                panel.classList.add('open');
            });

            // 历史日期导航
            histPrev.addEventListener('click', function() {
                historyDate = prevDay(historyDate);
                renderHistory();
            });

            histNext.addEventListener('click', function() {
                var today = getTodayStr();
                if (historyDate < today) {
                    historyDate = nextDay(historyDate);
                    renderHistory();
                }
            });

            // 添加按钮
            addBtn.addEventListener('click', function() { addTodo(input.value); });

            // 回车添加
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { addTodo(input.value); }
            });

            // 标签切换
            tabs.forEach(function(tab) {
                tab.addEventListener('click', function() {
                    tabs.forEach(function(t) { t.classList.remove('active'); });
                    tab.classList.add('active');
                    currentTab = tab.dataset.tab;
                    var phMap = { life: '输入生活事项...', study: '输入学习事项...', important: '输入重要长期任务...' };
                    input.placeholder = phMap[currentTab] || '输入新事项...';
                    render();
                });
            });

            // 点击面板外部关闭
            document.addEventListener('click', function(e) {
                var progressCard = document.getElementById('progressCard');
                if (panel.classList.contains('open') && !progressCard.contains(e.target)) {
                    panel.classList.remove('open');
                }
                if (historyPanel.classList.contains('open') && !progressCard.contains(e.target)) {
                    historyPanel.classList.remove('open');
                }
            });

            // 初始渲染
            render();
        })();
    </script>
</body>
</html>
